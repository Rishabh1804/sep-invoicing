    '<div class="inv-overlay-header"><span class="inv-overlay-title">' + escHtml(client.name) + '</span><div>' +
    '<button class="inv-overlay-close" data-action="invFlipCard" aria-label="Flip back">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>' +
    '</button>' +
    '<button class="inv-overlay-close" data-action="invCloseOverlay">&times;</button></div></div>' +
    '<div class="inv-flip-section-title">Recent Invoices</div>' + recentHtml +
    '<div class="inv-flip-section-title">Pending Challans</div>' + challanHtml +
    '<div class="inv-flip-actions">' +
    '<button class="inv-btn inv-btn-primary" data-action="invStatsCreateInvoice" data-client-id="' + clientId + '">Create Invoice</button>' +
    '<button class="inv-btn inv-btn-ghost" data-action="invStatsJumpRegister" data-client-id="' + clientId + '">View in Register</button>' +
    '<button class="inv-btn inv-btn-ghost" data-action="invStatsJumpIM" data-client-id="' + clientId + '">View in IM</button>' +
    '</div></div>' +
    '</div></div>';
  document.body.appendChild(scrim);
  focusFirstInteractive(scrim);
}

/* ===== HISTORY (Phase 7 — Activity Log Rework) ===== */
var _historyClientFilter = '';
var _historyDateFrom = '';
var _historyDateTo = '';
var _historyShowCount = 50;

function renderHistory() {
  var toolbar = document.getElementById('historyToolbar');
  var area = document.getElementById('historyList');
  if (!area) return;

  if (toolbar) {
    var clientIds = new Set();
    S.invoices.forEach(function(i) { clientIds.add(i.clientId); });
    (S.incomingMaterial || []).forEach(function(im) { clientIds.add(im.clientId); });
    var clientOpts = '';
    clientIds.forEach(function(cid) {
      var c = S.clients.find(function(x) { return x.id === cid; });
      if (c) clientOpts += '<option value="' + cid + '"' + (_historyClientFilter == cid ? ' selected' : '') + '>' + escHtml(c.name) + '</option>';
    });
    toolbar.innerHTML = '<div class="inv-im-toolbar"><div class="inv-history-filters">' +
      '<select class="inv-form-select" id="historyClientFilter">' +
      '<option value="">All Clients</option>' + clientOpts + '</select>' +
      '<input type="date" class="inv-form-input inv-history-date" id="historyDateFrom" value="' + escHtml(_historyDateFrom) + '">' +
      '<input type="date" class="inv-form-input inv-history-date" id="historyDateTo" value="' + escHtml(_historyDateTo) + '">' +
      '</div></div>';
  }

  var events = [];

  S.invoices.forEach(function(inv) {
    if (_historyClientFilter && inv.clientId != _historyClientFilter) return;
    events.push({ ts: inv.createdAt, type: 'invoice', sourceId: inv.id, text: 'Invoice ' + (inv.displayNumber || '') + ' created for ' + (inv.clientName || ''), amount: inv.grandTotal, dot: 'invoice' });
    if (inv.dispatchedAt) events.push({ ts: inv.dispatchedAt, type: 'state', sourceId: inv.id, text: (inv.displayNumber || '') + ' dispatched', dot: 'state' });
    if (inv.deliveredAt) events.push({ ts: inv.deliveredAt, type: 'state', sourceId: inv.id, text: (inv.displayNumber || '') + ' delivered (signed copy received)', dot: 'state' });
    if (inv.filedAt) events.push({ ts: inv.filedAt, type: 'state', sourceId: inv.id, text: (inv.displayNumber || '') + ' marked as filed in GSTR1', dot: 'state' });
    if (inv.status === 'cancelled' && inv.cancelledAt) events.push({ ts: inv.cancelledAt, type: 'cancel', sourceId: inv.id, text: (inv.displayNumber || '') + ' cancelled', dot: 'cancel' });
    if (inv.updatedAt && inv.updatedAt !== inv.createdAt) events.push({ ts: inv.updatedAt, type: 'state', sourceId: inv.id, text: (inv.displayNumber || '') + ' edited', dot: 'state' });
  });

  (S.incomingMaterial || []).forEach(function(im) {
    if (_historyClientFilter && im.clientId != _historyClientFilter) return;
    var challanAmt = im.items.reduce(function(s, it) { return s + (it.amount || 0); }, 0);
    events.push({
      ts: im.createdAt, type: 'challan', sourceId: im.id,
      text: 'Challan' + (im.challanNo ? ' ' + im.challanNo : '') + ' received from ' + (im.clientName || '') + ' (' + im.items.length + ' item' + (im.items.length > 1 ? 's' : '') + ')',
      amount: challanAmt, dot: 'challan'
    });
  });

  if (_historyDateFrom) {
    var fromTs = new Date(_historyDateFrom + 'T00:00:00').getTime();
    if (!isNaN(fromTs)) events = events.filter(function(ev) { return (ev.ts || 0) >= fromTs; });
  }
  if (_historyDateTo) {
    var toTs = new Date(_historyDateTo + 'T23:59:59').getTime();
    if (!isNaN(toTs)) events = events.filter(function(ev) { return (ev.ts || 0) <= toTs; });
  }

  events.sort(function(a, b) { return (b.ts || 0) - (a.ts || 0); });

  if (events.length === 0) {
    area.innerHTML = '<div class="inv-empty-state">No activity found</div>';
    return;
  }

  var html = '<div class="inv-stats-card">' +
    '<div class="inv-stats-title">Activity Log (' + events.length + ' events)</div>';

  var shown = events.slice(0, _historyShowCount);
  var currentDay = '';
  shown.forEach(function(ev) {
    var dayStr = ev.ts ? formatTimestamp(ev.ts).split(',')[0] : 'Unknown date';
    if (dayStr !== currentDay) {
      currentDay = dayStr;
      html += '<div class="inv-history-day-header">' + escHtml(dayStr) + '</div>';
    }
    var action = ev.type === 'challan' ? 'invHistoryJumpChallan' : 'invHistoryJumpInvoice';
    html += '<div class="inv-history-item" data-action="' + action + '" data-id="' + escHtml(ev.sourceId) + '">' +
      '<div class="inv-history-dot inv-history-dot-' + ev.dot + '"></div>' +
      '<div class="inv-history-body">' +
      '<div class="inv-history-text">' + escHtml(ev.text) +

}

function selectChallanClient(clientId) {
  if (!_challanForm) return;
  captureChallanFields();
  _challanForm.clientId = clientId;
  var client = S.clients.find(function(c) { return c.id === clientId; });
  // Auto-fill rate on existing items
  if (client) {
    _challanForm.items.forEach(function(item) {
      var rateInfo = getLineItemRate(client, _challanForm.challanDate || localDateStr(), item.partNumber);
      if (rateInfo._override) {
        item.rate = rateInfo.rate;
      } else {
        item.rate = rateInfo.ratePerKg || 0;
      }
      recalcChallanLine(item, client);
    });
  }
  renderAddChallanForm();
}

function recalcChallanLine(item, client) {
  if (!client) { item.amount = gstRound((item.qty || 0) * (item.rate || 0)); return; }
  if (client.billingMode === 'piece' && item.unit === 'NOS') {
    // Amount entered directly for NOS piece mode
    if (item.qty > 0 && item.amount > 0) {
      item.rate = gstRound(item.amount / item.qty);
    }
  } else {
    item.amount = gstRound((item.qty || 0) * (item.rate || 0));
  }
}

function addChallanLine() {
  if (!_challanForm) return;
  captureChallanFields();
  var client = _challanForm.clientId ? S.clients.find(function(c) { return c.id === _challanForm.clientId; }) : null;
  var item = { partNumber: '', desc: '', hsn: '998873', unit: 'KG', qty: 0, rate: 0, amount: 0, nosQty: null };
  if (client) {
    var rateInfo = getLineItemRate(client, _challanForm.challanDate || localDateStr(), '');
    item.rate = rateInfo.ratePerKg || 0;
  }
  _challanForm.items.push(item);
  renderAddChallanForm();
}

}

/* ===== CHALLAN SCANNER (Phase 4 — AI Vision) ===== */
var _scanExtractionPrompt = 'You are parsing an Indian delivery challan image for a zinc electroplating job work factory.\n\nExtract ALL data into this exact JSON structure. Return ONLY valid JSON, no markdown, no backticks, no explanation.\n\n{"challanNo":"string - just digits, strip leading zeros and FY suffix like /26-27","challanDate":"YYYY-MM-DD format","clientName":"string","vehicleNo":"string","items":[{"partNumber":"string","desc":"string","unit":"KG or NOS","qty":0,"nosQty":null,"rate":0,"amount":0}]}\n\nRULES for Dorabji Auto challans (printed white paper with DELIVERY CHALLAN header):\n- Qty column = NOS count -> put in nosQty\n- Wt.(Kgs.) column = weight in KG -> put in qty\n- Rate and Total columns = Dorabji internal pricing -> IGNORE\n- Set rate to 13, amount = qty * 13, unit = KG\n- Strip TRIVALENT YELLOW, FE, DO from description\n\nRULES for SSS Mehta challans (pink handwritten paper):\n- Qty = NOS count -> put in both qty AND nosQty\n- Amount column -> put in amount, Rate = amount/qty\n- unit = NOS\n\nFor other clients: KG billing, extract weight as qty.\nChallan number: just numeric part e.g. 0041/26-27 -> 41';

var _scanClientMap = {
  'DORABJI': {id:1, name:'DORABJI AUTO', rate:13},
  'SSSMEHTA': {id:2, name:'SSSMEHTA ENTERPRISES AND INDUSTRIES PVT LTD', rate:5.40},
  'SAMARTH': {id:3, name:'SAMARTH ENGG. CO. PVT. LTD.', rate:14.50},
  'HIGHCO': {id:4, name:'HIGHCO ENGINEERS PVT. LTD.', rate:11},
  'PARAKH': {id:5, name:'PARAKH INDUSTRIES', rate:10},
  'PAWAN': {id:6, name:'PAWAN AUTO P LTD', rate:10.50},
  'OM SHEET': {id:7, name:'OM SHEET METALS', rate:14.25},
  'GENERAL': {id:8, name:'GENERAL ENGINEERING CORPORATION', rate:14.25},
  'DILIP': {id:9, name:'DILIP PRESS METAL & AGROTECH P LTD', rate:13.50},
  'KHURANA': {id:13, name:'KHURANA INDUSTRIES', rate:14.25}
};

function _scanMatchClient(name) {
  if (!name) return null;
  var upper = name.toUpperCase();
  for (var key in _scanClientMap) {
    if (upper.indexOf(key) >= 0) return _scanClientMap[key];
  }
  return null;
}

function scanChallan() {
  var apiKey = getApiKey();
  if (!apiKey) {
    showToast('Set your Gemini API key in Settings first (free from aistudio.google.com)', 'warning');
    return;
  }
  var inp = document.getElementById('scanFileInput');
  if (!inp) return;
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    inp.value = '';
    _processScanImage(file, apiKey);
  };
  inp.click();
}

function _processScanImage(file, apiKey) {
  // Show processing overlay
  var proc = document.getElementById('scanProcessing');
  if (proc) {
    proc.innerHTML = '<div class="inv-scan-processing"><div class="inv-scan-processing-card">' +
      '<div class="inv-scan-spinner"></div>' +
      '<div class="inv-scan-processing-text">Reading challan</div>' +
      '<div class="inv-scan-processing-sub">Gemini is extracting the data</div></div></div>';
  }

  var reader = new FileReader();
  reader.onload = function(ev) {
    var base64 = ev.target.result.split(',')[1];
    var mediaType = file.type || 'image/jpeg';

    fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: mediaType, data: base64 } },
            { text: _scanExtractionPrompt }
          ]
        }]
      })
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      if (proc) proc.innerHTML = '';
      if (data.error) {
        showToast('API error: ' + (data.error.message || 'Unknown'), 'error');
        return;
      }
      // Extract text from Gemini response
      var text = '';
      try {
        var parts = data.candidates[0].content.parts;
        for (var p = 0; p < parts.length; p++) {
          if (parts[p].text) text += parts[p].text;
        }
      } catch(ex) {
        showToast('No response from Gemini', 'error');
        return;
      }
      var clean = text.replace(/```json|```/g, '').trim();
      var parsed;
      try { parsed = JSON.parse(clean); } catch(err) {
        showToast('Failed to parse response', 'error');
        return;
      }
      _applyScanResult(parsed);
    })
    .catch(function(err) {
      if (proc) proc.innerHTML = '';
      showToast('Scan failed: ' + err.message, 'error');
    });
  };
  reader.readAsDataURL(file);
}

function _applyScanResult(parsed) {
  // Match client
  var client = _scanMatchClient(parsed.clientName);
  if (client) {
    parsed.clientId = client.id;
    parsed.clientName = client.name;
    (parsed.items || []).forEach(function(item) {
      if (item.unit === 'KG' && client.rate) {
        item.rate = client.rate;
        item.amount = gstRound((item.qty || 0) * client.rate);
      }
    });
  }

  // Pre-fill the Add Challan form
  _challanForm = {
    clientId: parsed.clientId || null,
    challanNo: parsed.challanNo || '',
    challanDate: parsed.challanDate || localDateStr(),
    vehicleNo: parsed.vehicleNo || '',
    items: (parsed.items || []).map(function(item) {
      return {
        partNumber: item.partNumber || '',
        desc: item.desc || item.partNumber || '',
        hsn: '998873',
        unit: item.unit || 'KG',
        qty: item.qty || 0,
        rate: item.rate || 0,
        amount: item.amount || 0,
        nosQty: item.nosQty || null
      };
    }),
    notes: ''
  };

  if (_challanForm.items.length === 0) {
    _challanForm.items.push({partNumber:'', desc:'', hsn:'998873', unit:'KG', qty:0, rate:0, amount:0, nosQty:null});
  }

  renderAddChallanForm();
  showToast('Challan scanned: ' + (parsed.items || []).length + ' item' + ((parsed.items || []).length !== 1 ? 's' : '') + ' found');
}

/* ===== EVENT DELEGATION ===== */
document.addEventListener('click', function(e) {
  // Dismiss client search dropdown when clicking outside it
  const searchRes = document.getElementById('invClientResults');
  if (searchRes && !searchRes.classList.contains('inv-hidden')) {
    const searchWrap = searchRes.closest('.inv-search-wrap');
    if (searchWrap && !searchWrap.contains(e.target)) {
      searchRes.classList.add('inv-hidden');
    }
  }

  // Dismiss part autocomplete when clicking outside
  if (!e.target.closest('.inv-autocomplete-wrap')) {
    dismissAllAutocomplete();
  }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  switch(action) {
    case 'invSwitchTab': switchTab(btn.dataset.tab); break;
    case 'invCreateNew': initCreateForm(); switchTab('pageCreate'); break;
    case 'invOpenSettings': openSettings(); break;
    case 'invCloseOverlay': closeOverlay(); break;
    case 'invCloseConfirm': closeTopOverlay(); break;
    case 'invEditClient': openClientEdit(parseInt(btn.dataset.id)); break;
    case 'invSaveClient': saveClientEdit(parseInt(btn.dataset.client)); break;
    case 'invAddRate': addClientRate(parseInt(btn.dataset.client)); break;
    case 'invSelectClient': selectClient(parseInt(btn.dataset.id)); break;
    case 'invClearClient': captureOptionalFields(); invoiceForm.clientId = null; renderCreateForm(); break;
    case 'invAddLineItem': captureOptionalFields(); addLineItem(); break;
    case 'invRemoveLineItem': captureOptionalFields(); invoiceForm.items.splice(parseInt(btn.dataset.idx), 1); renderCreateForm(); break;
    case 'invSaveInvoice': saveInvoice(); break;
    case 'invViewInvoice': viewInvoice(btn.dataset.id); break;
    case 'invResetForm': initCreateForm(); break;
    case 'invSaveSettings': saveSettings(); break;
    case 'invExportData': exportData(); break;
    case 'invImportData': importData(); break;
    case 'invAddPartWeight': addPartWeight(); break;
    case 'invDeletePartWeight': deletePartWeight(btn.dataset.part); break;
    case 'invViewInvoiceDetail': openInvoiceDetail(btn.dataset.id); break;
    case 'invEditInvoice': editInvoice(btn.dataset.id); break;
    case 'invCancelInvoice': cancelInvoice(btn.dataset.id); break;
    case 'invConfirmCancel': confirmCancelInvoice(btn.dataset.id); break;
    case 'invDeleteInvoice': deleteInvoice(btn.dataset.id); break;
    case 'invConfirmDelete': confirmDeleteInvoice(btn.dataset.id); break;
    case 'invExportSales': exportSalesCSV(); break;
    case 'invExportGstr1': exportGSTR1CSV(); break;
    case 'invSelectPart': selectPartForLine(parseInt(btn.dataset.idx), parseInt(btn.dataset.partId)); break;
    case 'invFilterRegister': {
      const cf = document.getElementById('regClientFilter');
      const mf = document.getElementById('regMonthFilter');
      const sf = document.getElementById('regStateFilter');
      if (cf) regFilter.clientId = cf.value;
      if (mf) regFilter.month = mf.value;
      if (sf) regFilter.state = sf.value;
      saveRegFilter();
      _renderRegView();
      break;
    }
    case 'invToggleIM': toggleIMExpand(btn.dataset.id); break;
    case 'invCheckIMItem': toggleIMItem(btn.dataset.itemId); break;
    case 'invCheckIMChallan': toggleIMChallan(btn.dataset.id); break;
    case 'invCreateFromIM': createInvoiceFromIM(); break;
    case 'invFilterIM': {
      const icf = document.getElementById('imClientFilter');
      const isf = document.getElementById('imStatusFilter');
      if (icf) _imFilter.clientId = icf.value;
      if (isf) _imFilter.status = isf.value;
      _renderIMView();
      break;
    }
    // Phase 4: Print preview
    case 'invPreviewInvoice': closeOverlay(); showPrintPreview(btn.dataset.id); break;
    case 'invClosePrint': closePrintPreview(); break;
    case 'invPrint': window.print(); break;
    // Phase 4: IM Add Challan
    case 'invShowAddChallan': showAddChallanForm(); break;
    case 'invSaveChallan': saveChallan(); break;
    case 'invCancelChallan': cancelAddChallan(); break;
    case 'invAddChallanLine': captureChallanFields(); addChallanLine(); break;
    case 'invRemoveChallanLine': captureChallanFields(); removeChallanLine(parseInt(btn.dataset.idx)); break;
    case 'invSelectChallanClient': selectChallanClient(parseInt(btn.dataset.id)); break;
    case 'invClearChallanClient': if (_challanForm) { captureChallanFields(); _challanForm.clientId = null; renderAddChallanForm(); } break;
    case 'invSelectChallanPart': {
      if (!_challanForm) break;
      const pidx = parseInt(btn.dataset.idx);
      const part = S.items.find(function(p) { return p.id === parseInt(btn.dataset.partId); });
      if (!part) break;
      const cItem = _challanForm.items[pidx];
      if (!cItem) break;
      cItem.partNumber = part.partNumber;
      cItem.desc = part.desc;
      cItem.hsn = part.hsn || '998873';
      cItem.unit = part.unit || 'KG';
      const cClient = _challanForm.clientId ? S.clients.find(function(c) { return c.id === _challanForm.clientId; }) : null;
      if (cClient) {
        const cRateInfo = getLineItemRate(cClient, _challanForm.challanDate || localDateStr(), cItem.partNumber);
        if (cRateInfo._override) { cItem.rate = cRateInfo.rate; }
        else { cItem.rate = cRateInfo.ratePerKg || 0; }
        recalcChallanLine(cItem, cClient);
      }
      dismissAllAutocomplete();
      captureChallanFields();
      renderAddChallanForm();
      break;
    }
    // Phase 4: IM Delete Challan
    case 'invDeleteChallan': deleteChallan(btn.dataset.id); break;
    // Phase 5: IM Edit Challan
    case 'invEditChallan': editChallan(btn.dataset.id); break;
    case 'invEditChallanGuard': showToast('Cannot edit: ' + btn.dataset.count + ' item' + (parseInt(btn.dataset.count) > 1 ? 's' : '') + ' already invoiced', 'warning'); break;
    // Phase 5: Invoice lifecycle states
    case 'invAdvanceState': advanceInvoiceState(btn.dataset.id); break;
    case 'invBulkMarkFiled': bulkMarkFiled(); break;
    // Phase 7: Stats period chips
    case 'invStatsPeriod': _statsPeriod = btn.dataset.period; renderStats(); break;
    // Phase 7: Client drill-down overlay
    case 'invStatsClientDrill': openClientDrillOverlay(btn.dataset.clientId); break;
    // Phase 7: Flippable card
    case 'invFlipCard': {
      var inner = document.querySelector('.inv-flip-inner');
      if (!inner) break;
      var front = inner.querySelector('.inv-flip-front');
      var back = inner.querySelector('.inv-flip-back');
      if (!front || !back) break;
      var showingFront = !front.classList.contains('inv-flip-hidden');
      var outFace = showingFront ? front : back;
      var inFace = showingFront ? back : front;
      outFace.classList.add('inv-flip-out');
      setTimeout(function() {
        outFace.classList.remove('inv-flip-out');
        outFace.classList.add('inv-flip-hidden');
        outFace.classList.remove('inv-flip-visible');
        inFace.classList.remove('inv-flip-hidden');
        inFace.classList.add('inv-flip-visible', 'inv-flip-in');
        setTimeout(function() { inFace.classList.remove('inv-flip-in'); }, 250);
      }, 250);
      break;
    }
    // Phase 7: Stats actions
    case 'invStatsCreateInvoice': {
      closeOverlay();
      _preselectedClientId = btn.dataset.clientId;
      switchTab('pageCreate');
      break;
    }
    case 'invStatsJumpRegister': {
      closeOverlay();
      regFilter.clientId = btn.dataset.clientId;
      regFilter.search = '';
      regFilter.state = '';
      saveRegFilter();
      _tabDirty.register = true;
      _regToolbarRendered = false;
      switchTab('pageRegister');
      break;
    }
    case 'invStatsJumpIM': {
      closeOverlay();
      _imFilter.clientId = btn.dataset.clientId;
      _imToolbarRendered = false;
      switchTab('pageIM');
      break;
    }
    // Phase 7: History navigation
    case 'invHistoryJumpInvoice': {
      var inv = S.invoices.find(function(i) { return i.id === btn.dataset.id; });
      if (!inv) { showToast('Invoice not found', 'warning'); break; }
      regFilter.clientId = '';
      regFilter.search = inv.displayNumber || '';
      regFilter.state = '';
      saveRegFilter();
      _tabDirty.register = true;
      _regToolbarRendered = false;
      switchTab('pageRegister');
      break;
    }
    case 'invHistoryJumpChallan': {
      var imId = btn.dataset.id;
      var im = (S.incomingMaterial || []).find(function(c) { return c.id === imId; });
      if (!im) { showToast('Challan not found', 'warning'); break; }
      _imFilter.clientId = String(im.clientId);
      _imToolbarRendered = false;
      switchTab('pageIM');
      setTimeout(function() {
        var hdr = document.querySelector('[data-action="invToggleIM"][data-id="' + imId + '"]');
        var card = hdr ? hdr.closest('.inv-im-challan') : null;
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
      break;
    }
    // Phase 7: History load more
    case 'invHistoryLoadMore': _historyShowCount += 50; renderHistory(); break;
    // Phase 4: Challan Scanner
    case 'invScanChallan': scanChallan(); break;
    case 'invToggleApiKey': {
      var akEl = document.getElementById('setApiKey');
      if (akEl) akEl.type = akEl.type === 'password' ? 'text' : 'password';
      break;
    }
    // Phase 6: Items Master
    case 'invSwitchSubView': setItemsSubView(btn.dataset.view); renderClientsPage(); break;
    case 'invEditItem': openItemEdit(parseInt(btn.dataset.id)); break;
    case 'invAddItem': openItemAdd(); break;
    case 'invSaveItem': saveItem(parseInt(btn.dataset.id), btn.dataset.mode); break;
    case 'invDeleteItem': deleteItem(parseInt(btn.dataset.id)); break;
    case 'invOpenMergeTool': openMergeTool(); break;
    case 'invMergeGroup': mergeGroup(parseInt(btn.dataset.group)); break;
    case 'invMergeConfirm': confirmMerge(parseInt(btn.dataset.group), parseInt(btn.dataset.primary)); break;
    case 'invMergeCancelPreview': cancelMergePreview(parseInt(btn.dataset.group)); break;
    case 'invCalcWeights': calculateStdWeights(); break;
    case 'invFilterNoWeight': {
      var curFilter = getItemsFilter();
      regFilter.itemsFilter = curFilter === 'no-weight' ? 'all' : 'no-weight';
      saveRegFilter();
      _itemsRendered = 0;
      renderClientsPage();
      break;
    }
    case 'invFilterUnused': {
      var curFilter2 = getItemsFilter();
      regFilter.itemsFilter = curFilter2 === 'unused' ? 'all' : 'unused';
      saveRegFilter();
      _itemsRendered = 0;
      renderClientsPage();
      break;
    }
    case 'invSelectAllUnused': selectAllUnused(); break;
    case 'invToggleItemSelect': e.stopPropagation(); toggleItemSelect(parseInt(btn.dataset.id)); break;
    case 'invClearItemSelection': clearItemSelection(); break;
    case 'invBatchDeleteItems': batchDeleteItems(); break;
    case 'invLoadMoreItems': _renderItemsList(); break;
    case 'invItemsSort': {
      var sortEl = document.getElementById('itemsSort');
      if (sortEl) { regFilter.itemsSort = sortEl.value; saveRegFilter(); _itemsRendered = 0; _renderItemsList(); }
      break;
    }
    // Phase 8E: Clients/Items desktop row selection
    case 'invSelectClientRow': _renderClientDetail(parseInt(btn.dataset.id)); break;
    case 'invSelectItemRow': _renderItemDetail(parseInt(btn.dataset.id)); break;
    // Phase 6b: Register bulk operations
    case 'invRegToggleSort': toggleRegSortDir(); break;
    case 'invRegToggleSelect': toggleRegSelectMode(); break;
    case 'invRegToggleInv': e.stopPropagation(); toggleRegInv(btn.dataset.id); break;
    case 'invRegBulkState': regBulkSetState(btn.dataset.state); break;
    // Phase 8C: Desktop table interactions
    case 'invSelectRegRow': _renderRegDetail(btn.dataset.id); break;
    case 'invDesktopSort': {
      if (!regFilter.desktopSort) regFilter.desktopSort = { col: 'date', dir: 'desc' };
      if (regFilter.desktopSort.col === btn.dataset.col) {
        regFilter.desktopSort.dir = regFilter.desktopSort.dir === 'desc' ? 'asc' : 'desc';
      } else {
        regFilter.desktopSort = { col: btn.dataset.col, dir: 'desc' };
      }
      saveRegFilter();
      _renderRegView();
      break;
    }
    // Phase 8D: IM desktop table interactions
    case 'invSelectIMRow': _renderIMDetail(btn.dataset.id); break;
    case 'invDesktopIMSort': {
      if (!_imFilter.desktopSort) _imFilter.desktopSort = { col: 'date', dir: 'desc' };
      if (_imFilter.desktopSort.col === btn.dataset.col) {
        _imFilter.desktopSort.dir = _imFilter.desktopSort.dir === 'desc' ? 'asc' : 'desc';
      } else {
        _imFilter.desktopSort = { col: btn.dataset.col, dir: 'desc' };
      }
      _renderIMView();
      break;
    }
  }
});

/* Capture optional fields from DOM into invoiceForm before any re-render */
function captureOptionalFields() {
  const cn = document.getElementById('invChallanNo');
  const cd = document.getElementById('invChallanDate');
  const rm = document.getElementById('invRemarks');
  const tr = document.getElementById('invTransport');
  const po = document.getElementById('invPONumber');
  const pd = document.getElementById('invPODate');
  const dd = document.getElementById('invDespatchDate');
  const dt = document.getElementById('invDate');
  if (cn) invoiceForm.challanNo = cn.value;
  if (cd) invoiceForm.challanDate = cd.value;
  if (rm) invoiceForm.remarks = rm.value;
  if (tr) invoiceForm.transport = tr.value;
  if (po) invoiceForm.poNumber = po.value;
  if (pd) invoiceForm.poDate = pd.value;
  if (dd) invoiceForm.despatchDate = dd.value;
  if (dt) invoiceForm.date = dt.value;
}

/* Update totals section only (no full re-render) */
function updateTotalsDisplay() {
  const container = document.getElementById('invTotalsArea');
  if (!container) return;
  const client = invoiceForm.clientId ? S.clients.find(c => c.id === invoiceForm.clientId) : null;
  if (invoiceForm.items.length === 0) { container.innerHTML = ''; return; }
  const taxable = gstRound(invoiceForm.items.reduce((s,i) => s + (i.amount || 0), 0));
  const gstType = client ? client.gstType : 'intra';
  const cgst = gstType === 'intra' ? gstRound(taxable * 9 / 100) : 0;
  const sgst = gstType === 'intra' ? gstRound(taxable * 9 / 100) : 0;
  const igst = gstType === 'inter' ? gstRound(taxable * 18 / 100) : 0;
  const grand = gstRound(taxable + cgst + sgst + igst);
  let h = '<div class="inv-totals"><div class="inv-total-row"><span class="inv-total-label">Taxable Value</span><span class="inv-total-value">' + formatCurrency(taxable) + '</span></div>';
  if (gstType === 'intra') {
    h += '<div class="inv-total-row"><span class="inv-total-label">CGST @ 9%</span><span class="inv-total-value">' + formatCurrency(cgst) + '</span></div>' +
      '<div class="inv-total-row"><span class="inv-total-label">SGST @ 9%</span><span class="inv-total-value">' + formatCurrency(sgst) + '</span></div>';
  } else {
    h += '<div class="inv-total-row"><span class="inv-total-label">IGST @ 18%</span><span class="inv-total-value">' + formatCurrency(igst) + '</span></div>';
  }
  h += '<div class="inv-total-row inv-total-row-grand"><span class="inv-total-label">Grand Total</span><span class="inv-total-grand">' + formatCurrency(grand) + '</span></div></div>';
  container.innerHTML = h;
  // Update validation state
  const errors = validateInvoice();
  const errArea = document.getElementById('invErrorsArea');
  if (errArea) errArea.innerHTML = errors.length > 0 ? errors.map(e => '<div class="inv-error">' + escHtml(e) + '</div>').join('') : '';
  const saveBtn = document.getElementById('invSaveBtn');
  if (saveBtn) saveBtn.disabled = errors.length > 0;
}

document.addEventListener('change', function(e) {
  const el = e.target.closest('[data-action="invUpdateLine"]');
  if (el) {
    const idx = parseInt(el.dataset.idx);
    const field = el.dataset.field;
    const item = invoiceForm.items[idx];
    if (!item) return;
    const client = invoiceForm.clientId ? S.clients.find(c => c.id === invoiceForm.clientId) : null;
    if (field === 'unit') {
      item.unit = el.value;
      // Piece mode: switching to NOS means amount is user-entered, rate is back-calculated
      if (client && client.billingMode === 'piece' && el.value === 'NOS') {
        item.rate = 0;
        item.amount = 0;
      }
      recalcLineItem(item, client);
      captureOptionalFields();
      renderCreateForm();
    }
  }
  if (e.target.id === 'invDate') {
    invoiceForm.date = e.target.value;
  }
  // Register filters
  if (e.target.id === 'regClientFilter' || e.target.id === 'regMonthFilter' || e.target.id === 'regStateFilter') {
    const cf = document.getElementById('regClientFilter');
    const mf = document.getElementById('regMonthFilter');
    const sf = document.getElementById('regStateFilter');
    if (cf) regFilter.clientId = cf.value;
    if (mf) regFilter.month = mf.value;
    if (sf) regFilter.state = sf.value;
    saveRegFilter();
    _renderRegView();
  }
  // IM filters
  if (e.target.id === 'imClientFilter' || e.target.id === 'imStatusFilter') {
    const icf = document.getElementById('imClientFilter');
    const isf = document.getElementById('imStatusFilter');
    if (icf) _imFilter.clientId = icf.value;
    if (isf) _imFilter.status = isf.value;
    _renderIMView();
  }
  // Phase 6: Items sort
  if (e.target.id === 'itemsSort') {
    regFilter.itemsSort = e.target.value;
    saveRegFilter();
    _itemsRendered = 0;
    _renderItemsList();
  }
  // Phase 7: History filter changes (client + date range)
  if (e.target.id === 'historyClientFilter') {
    _historyClientFilter = e.target.value;
    _historyShowCount = 50;
    renderHistory();
  }
  if (e.target.id === 'historyDateFrom') {
    _historyDateFrom = e.target.value;
    _historyShowCount = 50;
    renderHistory();
  }
  if (e.target.id === 'historyDateTo') {
    _historyDateTo = e.target.value;
    _historyShowCount = 50;
    renderHistory();
  }
  // Phase 4: IM challan line unit change
  const challanLineEl = e.target.closest('[data-action="invUpdateChallanLine"]');
  if (challanLineEl && challanLineEl.dataset.field === 'unit' && _challanForm) {
    const cidx = parseInt(challanLineEl.dataset.idx);
    const citem = _challanForm.items[cidx];
    if (citem) {
      citem.unit = challanLineEl.value;
      var cclient = _challanForm.clientId ? S.clients.find(function(c) { return c.id === _challanForm.clientId; }) : null;
      if (cclient && cclient.billingMode === 'piece' && challanLineEl.value === 'NOS') {
        citem.rate = 0; citem.amount = 0;
      }
      recalcChallanLine(citem, cclient);
      captureChallanFields();
      renderAddChallanForm();
    }
  }
});

document.addEventListener('input', function(e) {
  if (e.target.id === 'clientSearch') {
    renderClientList(e.target.value);
  }
  // Part name editing + autocomplete
  if (e.target.dataset.action === 'invEditLinePart') {
    const idx = parseInt(e.target.dataset.idx);
    const item = invoiceForm.items[idx];
    if (item) {
      item.desc = e.target.value;
      item.partNumber = e.target.value;

      // Show part autocomplete dropdown
      showPartAutocomplete(idx, e.target.value);

      // Recalc for nos_to_weight: part name change affects weight lookup
      const client = invoiceForm.clientId ? S.clients.find(c => c.id === invoiceForm.clientId) : null;
      if (client && client.billingMode === 'nos_to_weight' && item.unit === 'NOS' && item.qty > 0) {
        recalcLineItem(item, client);
        const amtInput = document.querySelector('[data-field="amount"][data-idx="' + idx + '"]');
        if (amtInput) amtInput.value = formatNum(item.amount);
        updateTotalsDisplay();
      }
      // Also check itemRates override
      if (client && client.itemRates && client.itemRates.length > 0) {
        const rateInfo = getLineItemRate(client, invoiceForm.date, item.partNumber);
        if (rateInfo._override) {
          item.rate = rateInfo.rate;
          item._override = true;
          item._label = rateInfo._label;
          recalcLineItem(item, client);
          const rateInput = document.querySelector('[data-field="rate"][data-idx="' + idx + '"]');
          const amtInput = document.querySelector('[data-field="amount"][data-idx="' + idx + '"]');
          if (rateInput) rateInput.value = formatNum(item.rate);
          if (amtInput) amtInput.value = formatNum(item.amount);
          updateTotalsDisplay();
        }
      }
    }
    return;
  }
  // Phase 4: IM challan part editing + autocomplete
  if (e.target.dataset.action === 'invEditChallanPart' && _challanForm) {
    var cidx = parseInt(e.target.dataset.idx);
    var citem = _challanForm.items[cidx];
    if (citem) {
      citem.desc = e.target.value;
      citem.partNumber = e.target.value;
      // Show part autocomplete
      var acEl = document.getElementById('imPartAC' + cidx);
      if (acEl) {
        var matches = searchParts(e.target.value);
        if (matches.length === 0) { acEl.classList.add('inv-hidden'); }
        else {
          acEl.classList.remove('inv-hidden');
          acEl.innerHTML = matches.map(function(m) {
            return '<div class="inv-autocomplete-item" data-action="invSelectChallanPart" data-idx="' + cidx + '" data-part-id="' + m.id + '">' +
              '<span class="inv-autocomplete-part">' + escHtml(m.partNumber) + '</span>' +
              '<span class="inv-autocomplete-desc">' + escHtml(m.desc) + '</span></div>';
          }).join('');
        }
      }
      // Auto-fill rate from client rate card
      var cclient = _challanForm.clientId ? S.clients.find(function(c) { return c.id === _challanForm.clientId; }) : null;
      if (cclient && cclient.itemRates && cclient.itemRates.length > 0) {
        var rateInfo = getLineItemRate(cclient, _challanForm.challanDate || localDateStr(), citem.partNumber);
        if (rateInfo._override) {
          citem.rate = rateInfo.rate;
          recalcChallanLine(citem, cclient);
          var rI = document.querySelector('[data-action="invUpdateChallanLine"][data-field="rate"][data-idx="' + cidx + '"]');
          var aI = document.querySelector('[data-action="invUpdateChallanLine"][data-field="amount"][data-idx="' + cidx + '"]');
          if (rI) rI.value = formatNum(citem.rate);
          if (aI) aI.value = formatNum(citem.amount);
        }
      }
    }
    return;
  }
  // Phase 4: IM challan numeric field input
  var challanLineInput = e.target.closest('[data-action="invUpdateChallanLine"]');
  if (challanLineInput && _challanForm && (challanLineInput.dataset.field === 'qty' || challanLineInput.dataset.field === 'rate' || challanLineInput.dataset.field === 'amount' || challanLineInput.dataset.field === 'nosQty')) {
    var cidx2 = parseInt(challanLineInput.dataset.idx);
    var citem2 = _challanForm.items[cidx2];
    if (citem2) {
      // nosQty is integer, others are float
      if (challanLineInput.dataset.field === 'nosQty') {
        citem2.nosQty = parseInt(challanLineInput.value) || null;
        return;
      }
      var cclient2 = _challanForm.clientId ? S.clients.find(function(c) { return c.id === _challanForm.clientId; }) : null;
      citem2[challanLineInput.dataset.field] = parseFloat(challanLineInput.value) || 0;
      if (cclient2 && cclient2.billingMode === 'piece' && citem2.unit === 'NOS') {
        if (challanLineInput.dataset.field === 'amount' || challanLineInput.dataset.field === 'qty') {
          if (citem2.qty > 0 && citem2.amount > 0) {
            citem2.rate = gstRound(citem2.amount / citem2.qty);
            var rI2 = document.querySelector('[data-action="invUpdateChallanLine"][data-field="rate"][data-idx="' + cidx2 + '"]');
            if (rI2) rI2.value = formatNum(citem2.rate);
          }
        }
      } else {
        if (challanLineInput.dataset.field !== 'amount') {
          recalcChallanLine(citem2, cclient2);
          var aI2 = document.querySelector('[data-action="invUpdateChallanLine"][data-field="amount"][data-idx="' + cidx2 + '"]');
          if (aI2) aI2.value = formatNum(citem2.amount);
        }
      }
    }
    return;
  }
  // Numeric line item fields — update model + totals only, no full re-render
  const el = e.target.closest('[data-action="invUpdateLine"]');
  if (el && (el.dataset.field === 'qty' || el.dataset.field === 'rate' || el.dataset.field === 'amount')) {
    const idx = parseInt(el.dataset.idx);
    const item = invoiceForm.items[idx];
    if (!item) return;
    const client = invoiceForm.clientId ? S.clients.find(c => c.id === invoiceForm.clientId) : null;
    item[el.dataset.field] = parseFloat(el.value) || 0;

    if (client && client.billingMode === 'piece' && item.unit === 'NOS') {
      // Piece mode NOS: amount is user-entered, rate is back-calculated
      if (el.dataset.field === 'amount' || el.dataset.field === 'qty') {
        if (item.qty > 0 && item.amount > 0) {
          item.rate = gstRound(item.amount / item.qty);
          const rateInput = document.querySelector('[data-field="rate"][data-idx="' + idx + '"]');
          if (rateInput) rateInput.value = formatNum(item.rate);
        }
      }
    } else {
      // All other modes: amount = qty * rate
      if (el.dataset.field !== 'amount') {
        recalcLineItem(item, client);
        const amtInput = document.querySelector('[data-field="amount"][data-idx="' + idx + '"]');
        if (amtInput) amtInput.value = formatNum(item.amount);
      }
    }
    // Update totals without full DOM replacement
    updateTotalsDisplay();
  }
});

/* ESC key dismisses autocomplete, Enter moves to next field */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    dismissAllAutocomplete();
    var searchRes = document.getElementById('invClientResults');
    if (searchRes) searchRes.classList.add('inv-hidden');
    var imSearchRes = document.getElementById('imChallanClientResults');
    if (imSearchRes) imSearchRes.classList.add('inv-hidden');
  }
  // Enter key: move to next focusable field (skip readonly, skip buttons unless submit)
  if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT')) {
    // Don't interfere with autocomplete selection
    if (e.target.closest('.inv-autocomplete-wrap')) {
      var acList = e.target.closest('.inv-autocomplete-wrap').querySelector('.inv-autocomplete-list');
      if (acList && !acList.classList.contains('inv-hidden')) return;
    }
    e.preventDefault();
    // Find all focusable fields in the current page/form
    var container = e.target.closest('.inv-page-active, .inv-im-form-active, .inv-overlay-card');
    if (!container) container = document.body;
    var focusable = Array.from(container.querySelectorAll('input:not([readonly]):not([type="hidden"]):not(.inv-hidden), select:not(.inv-hidden), textarea:not(.inv-hidden)'));
    var curIdx = focusable.indexOf(e.target);
    if (curIdx >= 0 && curIdx < focusable.length - 1) {
      focusable[curIdx + 1].focus();
      if (focusable[curIdx + 1].type === 'number' || focusable[curIdx + 1].type === 'text') {
        focusable[curIdx + 1].select();
      }
    }
  }
});

/* ===== SWIPE NAVIGATION ===== */
(function() {
  var _swipeX = 0, _swipeY = 0;
  var TAB_ORDER = ['pageHome','pageCreate','pageIM','pageRegister','pageClients','pageStats','pageHistory'];

  document.addEventListener('touchstart', function(e) {
    _swipeX = e.touches[0].clientX;
    _swipeY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - _swipeX;
    var dy = e.changedTouches[0].clientY - _swipeY;
    var absDx = Math.abs(dx);
    var absDy = Math.abs(dy);

    // 80px threshold, 2:1 angle constraint
    if (absDx < 80 || absDx < absDy * 2) return;

    // Don't swipe if inside a horizontally scrollable container
    var target = e.target;
    while (target && target !== document.body) {
      if (target.scrollWidth > target.clientWidth + 2) return;
      target = target.parentElement;
    }

    var current = document.querySelector('.inv-page-active');
    if (!current) return;
    var idx = TAB_ORDER.indexOf(current.id);
    if (idx < 0) return;

    var next = dx < 0 ? idx + 1 : idx - 1;
    if (next < 0 || next >= TAB_ORDER.length) return;

    switchTab(TAB_ORDER[next]);
  }, { passive: true });
})();

/* Phase 5: Migrate existing invoices to lifecycle states */
(function() {
  var migrated = 0;
  (S.invoices || []).forEach(function(inv) {
    if (!inv.invoiceState) {
      inv.invoiceState = 'created';
      if (!inv.dispatchedAt) inv.dispatchedAt = null;
      if (!inv.deliveredAt) inv.deliveredAt = null;
      if (!inv.filedAt) inv.filedAt = null;
      migrated++;
    }
  });
  if (migrated > 0) saveJSON(STORAGE_KEY, S);
})();

/* Phase 5: Seed recentVehicles on clients from IM challan data */
(function() {
  var seeded = false;
  (S.incomingMaterial || []).forEach(function(im) {
    if (!im.vehicleNo || !im.vehicleNo.trim()) return;
    var v = im.vehicleNo.trim().toUpperCase();
    var client = S.clients.find(function(c) { return c.id === im.clientId; });
    if (!client) return;
    if (!client.recentVehicles) { client.recentVehicles = []; seeded = true; }
    if (client.recentVehicles.indexOf(v) < 0) {
      client.recentVehicles.push(v);
      seeded = true;
    }
  });
  if (seeded) saveJSON(STORAGE_KEY, S);
})();

/* Phase 5: Orphan detection — reset IM items pointing to deleted invoices */
(function() {
  var invoiceIds = {};
  (S.invoices || []).forEach(function(inv) { invoiceIds[inv.id] = true; });
  var repaired = 0;
  (S.incomingMaterial || []).forEach(function(im) {
    im.items.forEach(function(it) {
      if (it.invoiced && (!it.invoiceId || !invoiceIds[it.invoiceId])) {
        it.invoiced = false;
        it.invoiceId = null;
        repaired++;
      }
    });
  });
  if (repaired > 0) {
    saveJSON(STORAGE_KEY, S);
    console.log('Orphan repair: reset ' + repaired + ' IM item(s) pointing to deleted invoices');
  }
})();

/* Phase 6b: Remove Belrise trading items (rate > 25) — one-time cleanup */
if (!S._rateCleanup1) {
  var before = S.items.length;
  S.items = S.items.filter(function(it) { return (it.rate || 0) <= 25; });
  var removed = before - S.items.length;
  if (removed > 0) console.log('Rate cleanup: removed ' + removed + ' items with rate > 25 (Belrise trading remnants)');
  S._rateCleanup1 = true;
  saveJSON(STORAGE_KEY, S);
}

/* ===== LAYOUT MODE (Phase 8A) ===== */
var _resizeTimer = null;

function updateLayoutMode() {
  var w = window.innerWidth;
  var newDesktop = w >= 1024;
  var newTablet = w >= 768 && w < 1024;

  // No mode change — just update tablet class
  if (newDesktop === _isDesktop) {
    _isTablet = newTablet;
    document.body.classList.toggle('inv-tablet', _isTablet);
    return;
  }

  // Mode change — defer if overlay or form is active
  if (document.querySelector('.inv-overlay-scrim') || _challanForm) {
    _pendingModeSwitch = true;
    return;
  }

  _applyModeSwitch(newDesktop, newTablet);
}

function _applyModeSwitch(newDesktop, newTablet) {
  _isDesktop = newDesktop;
  _isTablet = newTablet;
  document.body.classList.toggle('inv-desktop', _isDesktop);
  document.body.classList.toggle('inv-tablet', _isTablet);
  _regToolbarRendered = false;
  _imToolbarRendered = false;
  renderSidebar();
  switchTab(regFilter.activeTab || 'pageHome');
}

  if (!_isDesktop) return;

  document.body.insertBefore(sidebar, document.body.firstChild);

  // Touch-desktop fallback
  sidebar.addEventListener('click', function(e) {

      if (!window.matchMedia('(hover: hover)').matches) {
        sidebar.classList.remove('inv-sidebar-expanded');
      }
      return;

    // Background tap — toggle expand/collapse
    if (!window.matchMedia('(hover: hover)').matches) {
      sidebar.classList.toggle('inv-sidebar-expanded');
    }
  });
}

// One-time outside-tap handler for sidebar collapse
document.addEventListener('click', function(e) {
  var sb = document.getElementById('invSidebar');
  if (sb && !sb.contains(e.target)) {
    sb.classList.remove('inv-sidebar-expanded');
  }
});

/* ===== GLOBAL DRAG HANDLERS (Phase 8B) ===== */
function _onDragMove(clientX) {
  if (!_dragState) return;
  var dx = clientX - _dragState.startX;
  var newW = _dragState.masterStart + dx;
  var minMaster = 280, minDetail = 320;
  var maxMaster = _dragState.containerW - minDetail;
  newW = Math.max(minMaster, Math.min(maxMaster, newW));
  document.getElementById(_dragState.masterId).style.width = (newW / _dragState.containerW * 100) + '%';
}

function _onDragEnd() {
  if (!_dragState) return;
  var master = document.getElementById(_dragState.masterId);
  var ratio = master.offsetWidth / master.parentElement.offsetWidth;
  if (!regFilter.desktopPanelWidths) regFilter.desktopPanelWidths = {};
  regFilter.desktopPanelWidths[_dragState.tabKey] = ratio;
  saveRegFilter();
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  _dragState = null;
}

document.addEventListener('mousemove', function(e) { _onDragMove(e.clientX); });
document.addEventListener('mouseup', _onDragEnd);
document.addEventListener('touchmove', function(e) {
  if (!_dragState) return;
  e.preventDefault();
  _onDragMove(e.touches[0].clientX);
}, { passive: false });
document.addEventListener('touchend', _onDragEnd);

// Debounced ResizeObserver
new ResizeObserver(function() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(updateLayoutMode, 150);
}).observe(document.documentElement);

// Initial layout detection (no debounce)
updateLayoutMode();

/* Phase 6b: Restore active tab on refresh */
// If updateLayoutMode triggered _applyModeSwitch, it already called switchTab.
// Only do manual restore if we're still on mobile (no mode switch happened).
if (!_isDesktop) {
  var _savedTab = regFilter.activeTab || 'pageHome';
  if (_savedTab !== 'pageHome' && document.getElementById(_savedTab)) {
    switchTab(_savedTab);
  } else {
    renderHome();
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
