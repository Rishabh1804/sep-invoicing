/* ===== CLIENTS/ITEMS DESKTOP MASTER-DETAIL (Phase 8E) ===== */
function _renderClientsDesktop(subView) {
  var container = document.getElementById('clientsPageContent');
  if (!container) return;

  var wrapper = document.getElementById('clientsMasterDetail');
  var toggleEl = document.getElementById('clientsDesktopToggle');

  if (!wrapper) {
    // First render — build full wrapper with toggle above
    container.innerHTML =
      '<div id="clientsDesktopToggle">' + _buildSubViewToggle(subView) + '</div>' +
      '<div class="inv-master-detail" id="clientsMasterDetail">' +
        '<div class="inv-master inv-master-clients" id="clientsMaster"></div>' +
        '<div class="inv-drag-handle" id="clientsDragHandle"></div>' +
        '<div class="inv-detail" id="clientsDetail">' + _renderDetailEmpty() + '</div>' +
      '</div>';
    _initDragHandle('clientsDragHandle', 'clientsMaster', 'clientsDetail', 'pageClients');
    _restorePanelWidth('clientsMaster', 'pageClients');
  } else {
    // Re-render — update toggle and master content only
    if (toggleEl) toggleEl.innerHTML = _buildSubViewToggle(subView);
  }

  var master = document.getElementById('clientsMaster');
  if (!master) return;

  // Detect sub-view switch: clear detail and both active IDs
  var prevSubView = master.dataset.subView;
  if (prevSubView && prevSubView !== subView) {
    _clientsActiveId = null;
    _itemsActiveId = null;
    var detail = document.getElementById('clientsDetail');
    if (detail) detail.innerHTML = _renderDetailEmpty();
  }
  master.dataset.subView = subView;

  if (subView === 'clients') {
    master.innerHTML = _buildClientsSubViewHtml(false);
    renderClientList('');
    _itemsActiveId = null;
  } else {
    master.innerHTML = _buildItemsSubViewHtml(false);
    _bindItemsSearch();
    _itemsRendered = 0;
    _renderItemsList();
    _clientsActiveId = null;
  }

  // Detail validation
  if (subView === 'clients' && _clientsActiveId) {
    var cStill = S.clients.find(function(c) { return c.id === _clientsActiveId; });
    if (!cStill) {
      _clientsActiveId = null;
      var d1 = document.getElementById('clientsDetail');
      if (d1) d1.innerHTML = _renderDetailEmpty();
    } else {
      _renderClientDetail(_clientsActiveId, true);
    }
  } else if (subView === 'items' && _itemsActiveId) {
    var iStill = S.items.find(function(it) { return it.id === _itemsActiveId; });
    if (!iStill) {
      _itemsActiveId = null;
      var d2 = document.getElementById('clientsDetail');
      if (d2) d2.innerHTML = _renderDetailEmpty();
    } else {
      _renderItemDetail(_itemsActiveId, true);
    }
  }
}

      ', ' + imLines + ' challan line' + (imLines !== 1 ? 's' : '') + '</div>';
  } else {
    html += '<div class="inv-detail-value inv-text-muted">Unused</div>';
  }
  html += '</div>';

  // Action buttons

function _bindItemsSearch() {

/* --- Sort & filter items --- */
function _getSortedFilteredItems() {
  var search = getItemsSearch().toLowerCase();
  var sort = getItemsSort();
  var filter = getItemsFilter();

  var list = S.items.slice();

  // Filter
  if (filter === 'no-weight') {
    list = list.filter(function(it) { return it.stdWeightKg == null; });
  } else if (filter === 'unused') {
    var cache = _buildUsageCache();
    list = list.filter(function(it) { return !cache[it.partNumber]; });
  }

  // Search
  if (search.length > 0) {
    list = list.filter(function(it) {
      return (it.partNumber || '').toLowerCase().indexOf(search) >= 0 ||
             (it.desc || '').toLowerCase().indexOf(search) >= 0;
    });
  }

  // Sort
  if (sort === 'alpha') {
    list.sort(function(a, b) { return (a.partNumber || '').localeCompare(b.partNumber || ''); });
  } else if (sort === 'unit') {
    list.sort(function(a, b) {
      if (a.unit !== b.unit) return (a.unit || '').localeCompare(b.unit || '');
      return (a.partNumber || '').localeCompare(b.partNumber || '');
    });
  } else if (sort === 'rate') {
    list.sort(function(a, b) { return (b.rate || 0) - (a.rate || 0); });
  } else if (sort === 'usage') {
    list.sort(function(a, b) { return _getUsageScore(b.partNumber) - _getUsageScore(a.partNumber); });
  }

  return list;
}

function _renderItemsList() {
  var listEl = document.getElementById('itemsList');
  var moreEl = document.getElementById('itemsLoadMore');
  var countEl = document.getElementById('itemsCount');
  if (!listEl) return;

  _itemsSorted = _getSortedFilteredItems();
  var total = _itemsSorted.length;
  var search = getItemsSearch();

  if (countEl) countEl.textContent = total + ' item' + (total !== 1 ? 's' : '');

  if (total === 0) {
    listEl.innerHTML = '<div class="inv-empty-state">No items found</div>';
    if (moreEl) moreEl.innerHTML = '';
    return;
  }

  // For search results, render up to 100; otherwise batch
  var limit = search.length > 0 ? Math.min(total, 100) : Math.min(total, _itemsRendered + ITEMS_BATCH);
  if (_itemsRendered === 0) limit = Math.min(total, ITEMS_BATCH);

  var html = '<div class="inv-card-list">';
  for (var i = 0; i < limit; i++) {
    var it = _itemsSorted[i];
    var rateStr = (it.rate != null && it.rate > 0) ? formatCurrency(it.rate) : '';
    var noRate = !it.rate || it.rate === 0;
    var weightStr = it.stdWeightKg != null ? formatNum(it.stdWeightKg, 3) + ' kg' : '';
    var usageCount = _getUsageCount(it.partNumber);
    var isSelected = !!_itemsSelected[it.id];
    var itemAction = _isDesktop ? 'invSelectItemRow' : 'invEditItem';
    var itemActiveClass = (_isDesktop && _itemsActiveId === it.id) ? ' inv-item-card-active' : '';

    html += '<div class="inv-item-card' + (isSelected ? ' inv-item-selected' : '') + itemActiveClass + '" data-action="' + itemAction + '" data-id="' + it.id + '">' +
      '<div class="inv-item-card-top">' +
      '<label class="inv-item-check-wrap" data-action="invToggleItemSelect" data-id="' + it.id + '">' +
      '<input type="checkbox"' + (isSelected ? ' checked' : '') + ' class="inv-im-check"></label>' +
      '<span class="inv-item-pn inv-mono">' + escHtml(it.partNumber) + '</span>' +
      '<span class="inv-item-unit inv-client-badge inv-badge-mode">' + escHtml(it.unit) + '</span>' +
      '</div>' +
      '<div class="inv-item-card-bottom">' +
      '<span class="inv-item-desc">' + escHtml(it.desc || '') + '</span>' +
      '<span class="inv-item-rate inv-mono' + (noRate ? ' inv-text-muted' : ' inv-text-cost') + '">' +
      (noRate ? 'No rate' : rateStr) + '</span>' +
      '</div>' +
      '<div class="inv-item-badges-row">' +
      (weightStr ? '<span class="inv-weight-badge">' + escHtml(weightStr) + '</span>' : '') +
      (usageCount > 0 ? '<span class="inv-usage-badge">' + usageCount + ' ref' + (usageCount !== 1 ? 's' : '') + '</span>' :
        '<span class="inv-usage-badge inv-usage-zero">Unused</span>') +
      '</div>' +
      '</div>';
  }
  html += '</div>';

  listEl.innerHTML = html;
  _itemsRendered = limit;

  // Selection bar
  _renderItemsSelectionBar();

  // Load more button
  if (moreEl) {
    if (limit < total && search.length === 0) {
      moreEl.innerHTML = '<div class="inv-btn-bar inv-btn-bar-center">' +
        '<button class="inv-btn inv-btn-ghost" data-action="invLoadMoreItems">Load more (' + (total - limit) + ' remaining)</button></div>';
    } else {
      moreEl.innerHTML = '';
    }
  }

  // Phase 8E: Desktop detail validation — active item filtered out → clear detail
  if (_isDesktop && _itemsActiveId) {
    var stillVisible = _itemsSorted.find(function(it) { return it.id === _itemsActiveId; });
    if (!stillVisible) {
      _itemsActiveId = null;
      var detail = document.getElementById('clientsDetail');
      if (detail) detail.innerHTML = _renderDetailEmpty();
    }
  }
}

  var pn = document.getElementById('itemEditPN').value.trim();

  var desc = document.getElementById('itemEditDesc').value.trim();
  var hsn = document.getElementById('itemEditHSN').value.trim() || '998873';

  var rate = parseFloat(document.getElementById('itemEditRate').value) || 0;
  var wVal = document.getElementById('itemEditWeight').value.trim();
  var stdW = wVal !== '' ? parseFloat(wVal) : null;

  if (mode === 'add') {
    var maxId = S.items.reduce(function(mx, it) { return Math.max(mx, it.id); }, 0);
    S.items.push({
      id: maxId + 1,
      partNumber: pn,
      desc: desc,
      hsn: hsn,
      unit: unit,
      rate: rate,
      stdWeightKg: stdW
    });

  });

function findDuplicateGroups(items) {
  var groups = [];
  var used = {};

  var coreMap = {};
  items.forEach(function(it) {
    var core = _extractNumericCore(it.partNumber);
    if (!core || core.replace(/\s/g, '').length < 4) return;
    if (!coreMap[core]) coreMap[core] = [];
    coreMap[core].push(it);
  });

  Object.keys(coreMap).forEach(function(core) {
    if (coreMap[core].length < 2) return;
    var ids = coreMap[core].map(function(it) { return it.id; }).sort().join(',');
    if (used[ids]) return;
    used[ids] = true;

    var descs = {};
    coreMap[core].forEach(function(it) {
      var d = (it.desc || '').toUpperCase().trim();
      if (d && d !== (it.partNumber || '').toUpperCase().trim()) {
        descs[d] = true;
      }
    });

    groups.push({ items: coreMap[core], _warn: Object.keys(descs).length > 1 });
  });

  groups.sort(function(a, b) {
    if (a._warn !== b._warn) return a._warn ? 1 : -1;
    return b.items.length - a.items.length;
  });

  return groups;
}

function _extractNumericCore(partNumber) {
  if (!partNumber) return '';
  var digits = partNumber.match(/\d+/g);
  if (!digits) return '';
  return digits.join(' ');
}

function mergeGroup(groupIdx) {
  var scrim = document.querySelector('.inv-overlay-scrim');
  if (!scrim || !scrim._mergeGroups) return;
  var group = scrim._mergeGroups[groupIdx];
  if (!group) return;

  var radios = document.querySelectorAll('input[name="mergePrimary' + groupIdx + '"]');
  var primaryId = null;
  radios.forEach(function(r) { if (r.checked) primaryId = parseInt(r.value); });
  if (primaryId == null) return;

  var primary = group.items.find(function(it) { return it.id === primaryId; });
  if (!primary) return;
  var secondaries = group.items.filter(function(it) { return it.id !== primaryId; });
  if (secondaries.length === 0) return;

  var secondaryPNs = secondaries.map(function(it) { return it.partNumber; });

  var invCount = 0;
  var imCount = 0;
  (S.invoices || []).forEach(function(inv) {
    var affected = false;
    inv.items.forEach(function(li) {
      if (secondaryPNs.indexOf(li.partNumber) >= 0) affected = true;
    });
    if (affected) invCount++;
  });
  (S.incomingMaterial || []).forEach(function(im) {
    var affected = false;
    im.items.forEach(function(li) {
      if (secondaryPNs.indexOf(li.partNumber) >= 0) affected = true;
    });
    if (affected) imCount++;
  });

  var groupEl = document.getElementById('mergeGroup' + groupIdx);
  if (!groupEl) return;

  groupEl.innerHTML = '<div class="inv-merge-preview">' +
    '<div class="inv-card-title">Merge into: ' + escHtml(primary.partNumber) + '</div>' +
    '<div class="inv-text-muted inv-storage-text inv-mb-8">Will remove: ' + secondaries.length + ' duplicate item' + (secondaries.length !== 1 ? 's' : '') + '</div>' +
    '<div class="inv-text-muted inv-storage-text inv-mb-16">Will update: ' + invCount + ' invoice' + (invCount !== 1 ? 's' : '') + ', ' + imCount + ' challan' + (imCount !== 1 ? 's' : '') + '</div>' +
    '<div class="inv-btn-bar">' +
    '<button class="inv-btn inv-btn-ghost inv-btn-sm" data-action="invMergeCancelPreview" data-group="' + groupIdx + '">Cancel</button>' +
    '<button class="inv-btn inv-btn-primary inv-btn-sm" data-action="invMergeConfirm" data-group="' + groupIdx + '" data-primary="' + primaryId + '">Confirm Merge</button>' +
    '</div></div>';
}

function confirmMerge(groupIdx, primaryId) {
  var scrim = document.querySelector('.inv-overlay-scrim');
  if (!scrim || !scrim._mergeGroups) return;
  var group = scrim._mergeGroups[groupIdx];
  if (!group) return;

  var primary = group.items.find(function(it) { return it.id === primaryId; });
  if (!primary) return;
  var secondaries = group.items.filter(function(it) { return it.id !== primaryId; });
  var secondaryPNs = secondaries.map(function(it) { return it.partNumber; });

  var invUpdated = 0;
  (S.invoices || []).forEach(function(inv) {
    inv.items.forEach(function(li) {
      if (secondaryPNs.indexOf(li.partNumber) >= 0) {
        li.partNumber = primary.partNumber;
        li.desc = primary.desc;
        invUpdated++;
      }
    });
  });

  var imUpdated = 0;
  (S.incomingMaterial || []).forEach(function(im) {
    im.items.forEach(function(li) {
      if (secondaryPNs.indexOf(li.partNumber) >= 0) {
        li.partNumber = primary.partNumber;
        li.desc = primary.desc;
        imUpdated++;
      }
    });
  });

  secondaries.forEach(function(sec) {
    var idx = S.items.indexOf(sec);
    if (idx > -1) S.items.splice(idx, 1);
  });

  saveState();

  var groupEl = document.getElementById('mergeGroup' + groupIdx);
  if (groupEl) groupEl.remove();
  scrim._mergeGroups[groupIdx] = null;

  showToast('Merged ' + (secondaries.length + 1) + ' \u2192 1. Updated ' + invUpdated + ' invoice line' + (invUpdated !== 1 ? 's' : '') + ', ' + imUpdated + ' challan line' + (imUpdated !== 1 ? 's' : '') + '.');
}

function cancelMergePreview(groupIdx) {
  closeOverlay();
  openMergeTool();
}

/* --- Weight Calculator --- */
function calculateStdWeights() {
  var calculated = 0;
  var highVariance = 0;

  S.items.forEach(function(item) {
    if (item.stdWeightKg != null) return;

    var pairs = [];

    (S.invoices || []).forEach(function(inv) {
      inv.items.forEach(function(li) {
        if (li.partNumber === item.partNumber && li.unit === 'KG' && li.nosQty > 0 && li.qty > 0) {
          pairs.push({ kg: li.qty, nos: li.nosQty });
        }
      });
    });

    (S.incomingMaterial || []).forEach(function(im) {
      im.items.forEach(function(li) {
        if (li.partNumber === item.partNumber && li.unit === 'KG' && li.nosQty > 0 && li.qty > 0) {
          pairs.push({ kg: li.qty, nos: li.nosQty });
        }
      });
    });

    if (pairs.length === 0) return;

    var weights = pairs.map(function(p) { return p.kg / p.nos; });
    var avg = weights.reduce(function(s, w) { return s + w; }, 0) / weights.length;

    if (weights.length > 1) {
      var variance = weights.reduce(function(s, w) { return s + Math.pow(w - avg, 2); }, 0) / weights.length;
      var cv = (Math.sqrt(variance) / avg) * 100;
      if (cv > 20) highVariance++;
    }

    item.stdWeightKg = gstRound(avg * 1000) / 1000;
    calculated++;
  });

  if (calculated > 0) {
    saveState();
    _itemsRendered = 0;
    _renderItemsList();
  }

  var msg = 'Calculated weights for ' + calculated + ' item' + (calculated !== 1 ? 's' : '') + ' from invoice/challan history';
  if (highVariance > 0) msg += '. ' + highVariance + ' with high variance (>20% CV)';
  if (calculated === 0) msg = 'No items with calculable weights found. Need invoice/challan data with both KG qty and NOS count.';
  showToast(msg, calculated > 0 ? 'success' : 'warning');
}

/* --- Usage Scoring (Phase 6b) --- */
function _buildUsageCache() {
  if (_itemsUsageCache) return _itemsUsageCache;
  var cache = {};
  var now = Date.now();
  var thirtyDaysMs = 30 * 86400000;

  (S.invoices || []).forEach(function(inv) {
    var recent = inv.createdAt && (now - inv.createdAt) < thirtyDaysMs;
    (inv.items || []).forEach(function(li) {
      var pn = li.partNumber;
      if (!pn) return;
      if (!cache[pn]) cache[pn] = { total: 0, recent: 0 };
      cache[pn].total++;
      if (recent) cache[pn].recent++;
    });
  });

  (S.incomingMaterial || []).forEach(function(im) {
    var recent = im.createdAt && (now - im.createdAt) < thirtyDaysMs;
    (im.items || []).forEach(function(li) {
      var pn = li.partNumber;
      if (!pn) return;
      if (!cache[pn]) cache[pn] = { total: 0, recent: 0 };
      cache[pn].total++;
      if (recent) cache[pn].recent++;
    });
  });

  _itemsUsageCache = cache;
  return cache;
}

function _getUsageScore(partNumber) {
  var cache = _buildUsageCache();
  var entry = cache[partNumber];
  if (!entry) return 0;
  return entry.total + (entry.recent * 2);
}

function _getUsageCount(partNumber) {
  var cache = _buildUsageCache();
  var entry = cache[partNumber];
  return entry ? entry.total : 0;
}

function _invalidateUsageCache() {
  _itemsUsageCache = null;
}

/* --- Batch Select/Delete --- */
function toggleItemSelect(itemId) {
  _itemsSelected[itemId] = !_itemsSelected[itemId];
  if (!_itemsSelected[itemId]) delete _itemsSelected[itemId];
  _renderItemsSelectionBar();
  // Toggle visual on card
  var card = document.querySelector('.inv-item-card[data-id="' + itemId + '"]');
  if (card) card.classList.toggle('inv-item-selected', !!_itemsSelected[itemId]);
}

function selectAllUnused() {
  _itemsSelected = {};
  var cache = _buildUsageCache();
  S.items.forEach(function(it) {
    if (!cache[it.partNumber]) _itemsSelected[it.id] = true;
  });
  _itemsRendered = 0;
  _renderItemsList();
  _renderItemsSelectionBar();
  var count = Object.keys(_itemsSelected).length;
  showToast(count + ' unused item' + (count !== 1 ? 's' : '') + ' selected');
}

function clearItemSelection() {
  _itemsSelected = {};
  _itemsRendered = 0;
  _renderItemsList();
  _renderItemsSelectionBar();
}

function batchDeleteItems() {
  var ids = Object.keys(_itemsSelected).filter(function(k) { return _itemsSelected[k]; }).map(Number);
  if (ids.length === 0) return;
  if (!confirm('Delete ' + ids.length + ' item' + (ids.length !== 1 ? 's' : '') + '? Historical invoice/challan references will be kept.')) return;
  S.items = S.items.filter(function(it) { return ids.indexOf(it.id) < 0; });
  _itemsSelected = {};
  _invalidateUsageCache();
  saveState();
  _itemsRendered = 0;
  _renderItemsList();
  _renderItemsSelectionBar();
  showToast(ids.length + ' item' + (ids.length !== 1 ? 's' : '') + ' deleted');
}

function _renderItemsSelectionBar() {
  var count = Object.keys(_itemsSelected).filter(function(k) { return _itemsSelected[k]; }).length;
  var bar = document.getElementById('itemsSelBar');
  if (!bar) return;
  if (count === 0) {
    bar.innerHTML = '';
    return;
  }
  bar.innerHTML = '<div class="inv-im-sel-bar">' +
    '<span class="inv-im-sel-count">' + count + ' selected</span>' +
    '<div class="inv-items-sel-actions">' +
    '<button class="inv-btn inv-btn-ghost inv-btn-sm inv-sel-clear-btn" data-action="invClearItemSelection">Clear</button>' +
    '<button class="inv-im-sel-btn" data-action="invBatchDeleteItems">Delete</button>' +
    '</div></div>';
}

function validateInvoice() {
  const errors = [];
  if (!invoiceForm.clientId) errors.push('Select a client');
  if (!invoiceForm.date) errors.push('Enter invoice date');
  if (invoiceForm.items.length === 0) errors.push('Add at least one line item');
  invoiceForm.items.forEach((item, i) => {
    if (item.qty < 0) errors.push('Line ' + (i+1) + ': Quantity cannot be negative');
    if (item.amount < 0) errors.push('Line ' + (i+1) + ': Amount cannot be negative');
  });
  return errors;
}

function selectClient(id) {
  captureOptionalFields();
  invoiceForm.clientId = id;
  const client = S.clients.find(c => c.id === id);
  // Auto-fill rate on existing items
  if (client) {
    invoiceForm.items.forEach(item => {
      const rateInfo = getLineItemRate(client, invoiceForm.date, item.partNumber);
      if (rateInfo._override) {
        item.rate = rateInfo.rate;
        item._override = true;
        item._label = rateInfo._label;
      } else {
        item.rate = rateInfo.ratePerKg || 0;
      }
      recalcLineItem(item, client);
    });
  }
  renderCreateForm();
}

function addLineItem() {
  captureOptionalFields();
  const client = invoiceForm.clientId ? S.clients.find(c => c.id === invoiceForm.clientId) : null;
  const item = {partNumber:'', desc:'', hsn:'998873', unit:'KG', qty:0, rate:0, amount:0, _override:false, _label:''};
  if (client) {
    const rateInfo = getLineItemRate(client, invoiceForm.date, '');
    item.rate = rateInfo.ratePerKg || 0;
  }
  invoiceForm.items.push(item);
  renderCreateForm();
}

function recalcLineItem(item, client) {
  if (!client) { item.amount = gstRound((item.qty||0) * (item.rate||0)); return; }
  if (client.billingMode === 'piece' && item.unit === 'NOS') {
    // Challan passthrough: amount entered directly, rate back-calculated
    if (item.qty > 0 && item.amount > 0) {
      item.rate = gstRound(item.amount / item.qty);
    }
    // Don't auto-calc amount for NOS piece mode
  } else if (client.billingMode === 'nos_to_weight' && item.unit === 'NOS') {
    const pwKey = (item.partNumber || '').toUpperCase();
    const w = (item.qty || 0) * (S.partWeights[pwKey] || 0);
    const rateInfo = getLineItemRate(client, invoiceForm.date, item.partNumber);
    item.rate = rateInfo.ratePerKg || 0;
    item.amount = gstRound(w * item.rate);
  } else {
    item.amount = gstRound((item.qty || 0) * (item.rate || 0));
  }
}

function saveInvoice() {
  const errors = validateInvoice();
  if (errors.length > 0) { showToast(errors[0], 'error'); return; }

  const client = S.clients.find(c => c.id === invoiceForm.clientId);
  if (!client) return;

  invoiceForm.challanNo = (document.getElementById('invChallanNo') || {}).value || '';
  invoiceForm.challanDate = (document.getElementById('invChallanDate') || {}).value || '';
  invoiceForm.transport = (document.getElementById('invTransport') || {}).value || '';
  invoiceForm.poNumber = (document.getElementById('invPONumber') || {}).value || '';
  invoiceForm.poDate = (document.getElementById('invPODate') || {}).value || '';
  invoiceForm.despatchDate = (document.getElementById('invDespatchDate') || {}).value || '';
  invoiceForm.remarks = (document.getElementById('invRemarks') || {}).value || '';
  invoiceForm.date = document.getElementById('invDate').value;

  const taxable = gstRound(invoiceForm.items.reduce((s,i) => s + (i.amount || 0), 0));
  const cgstPer = client.gstType === 'intra' ? 9 : 0;
  const sgstPer = client.gstType === 'intra' ? 9 : 0;
  const igstPer = client.gstType === 'inter' ? 18 : 0;
  const cgstAmt = gstRound(taxable * cgstPer / 100);
  const sgstAmt = gstRound(taxable * sgstPer / 100);
  const igstAmt = gstRound(taxable * igstPer / 100);
  const grand = gstRound(taxable + cgstAmt + sgstAmt + igstAmt);

  const now = Date.now();

  if (invoiceForm.editingId) {
    // Update existing
    const inv = S.invoices.find(i => i.id === invoiceForm.editingId);
    if (!inv) return;
    const gstTypeChanged = inv.gstType !== client.gstType;
    Object.assign(inv, {
      date: invoiceForm.date, clientId: client.id, clientName: client.name,
      clientGSTIN: client.gstin, clientAddress: {add1:client.add1,add2:client.add2,add3:client.add3,state:client.state,stateCode:client.stateCode},
      gstType: client.gstType,
      items: invoiceForm.items.map(i => ({partNumber:i.partNumber,desc:i.desc,hsn:i.hsn||'998873',unit:i.unit,qty:i.qty,rate:i.rate,amount:i.amount,nosQty:i.nosQty||null})),
      taxableValue: taxable, cgstPer, cgstAmt, sgstPer, sgstAmt, igstPer, igstAmt,
      grandTotal: grand, amountInWords: numberToWords(grand),
      challanNo: invoiceForm.challanNo, challanDate: invoiceForm.challanDate,
      poNumber: invoiceForm.poNumber, poDate: invoiceForm.poDate,
      despatchDate: invoiceForm.despatchDate, transport: invoiceForm.transport, remarks: invoiceForm.remarks, updatedAt: now
    });
    if (gstTypeChanged) {
      showToast('Invoice updated — GST type changed, verify tax amounts', 'warning');
    } else {
      showToast('Invoice updated');
    }
  } else {
    // New invoice
    const num = String(S.invNextNum).padStart(5, '0');
    const inv = {
      id: 'INV-' + now,
      invoiceNumber: num,
      displayNumber: S.invPrefix + num,
      date: invoiceForm.date,
      status: 'active',
      invoiceState: 'created',
      dispatchedAt: null, deliveredAt: null, filedAt: null,
      clientId: client.id, clientName: client.name,
      clientGSTIN: client.gstin,
      clientAddress: {add1:client.add1,add2:client.add2,add3:client.add3,state:client.state,stateCode:client.stateCode},
      gstType: client.gstType,
      items: invoiceForm.items.map(i => ({partNumber:i.partNumber,desc:i.desc,hsn:i.hsn||'998873',unit:i.unit,qty:i.qty,rate:i.rate,amount:i.amount,nosQty:i.nosQty||null})),
      taxableValue: taxable, cgstPer, cgstAmt, sgstPer, sgstAmt, igstPer, igstAmt,
      grandTotal: grand, amountInWords: numberToWords(grand),
      poNumber: invoiceForm.poNumber, poDate: invoiceForm.poDate, challanNo: invoiceForm.challanNo, challanDate: invoiceForm.challanDate,
      despatchDate: invoiceForm.despatchDate, transport: invoiceForm.transport, eWayBill:'', remarks: invoiceForm.remarks,
      linkedIMIds: invoiceForm._linkedIMIds || [], createdAt: now, updatedAt: now, cancelledAt: null
    };
    S.invoices.push(inv);
    S.invNextNum++;

    // Mark IM items as invoiced
    if (invoiceForm._linkedIMItemIds && invoiceForm._linkedIMItemIds.length > 0) {
      (S.incomingMaterial || []).forEach(function(im) {
        im.items.forEach(function(it) {
          if (invoiceForm._linkedIMItemIds.indexOf(it.id) >= 0) {
            it.invoiced = true;
            it.invoiceId = inv.id;
          }
        });
      });
    }

    showToast('Invoice ' + inv.displayNumber + ' saved');
  }

  // Save vehicle number to client for autocomplete
  saveVehicleToClient(invoiceForm.clientId, invoiceForm.transport);

  saveState();
  const returnDest = _navReturnTab || 'pageHome';
  initCreateForm();
  switchTab(returnDest);
}

function saveSettings() {

  S.company.gstin = document.getElementById('setCompGstin').value.trim();
  S.company.add1 = document.getElementById('setCompAdd1').value.trim();
  S.company.add2 = document.getElementById('setCompAdd2').value.trim();
  S.company.phone = document.getElementById('setCompPhone').value.trim();
  S.bankDetails = document.getElementById('setBank').value.trim();
  S.invPrefix = document.getElementById('setPrefix').value.trim();
  S.invNextNum = parseInt(document.getElementById('setNextNum').value) || S.invNextNum;

  if (apiKeyEl) setApiKey(apiKeyEl.value.trim());

function estimateStorage() {
  try {
    const s = JSON.stringify(S).length;
    if (s > 1048576) return (s / 1048576).toFixed(1) + ' MB';
    return (s / 1024).toFixed(0) + ' KB';
  } catch(e) { return 'Unknown'; }
}

function renderPartWeightsList() {
  const entries = Object.entries(S.partWeights || {});
  if (entries.length === 0) return '<div class="inv-text-muted inv-storage-text">No part weights defined yet</div>';
  return entries.map(([part, wt]) =>
    '<div class="inv-rate-row"><span class="inv-mono">' + escHtml(part) + '</span>' +
    '<span class="inv-flex-between"><span class="inv-mono inv-text-cost">' + escHtml(wt) + ' kg</span>' +
    '<button class="inv-btn inv-btn-ghost inv-btn-sm" data-action="invDeletePartWeight" data-part="' + escHtml(part) + '">&times;</button></span></div>'
  ).join('');
}

function addPartWeight() {
  const partEl = document.getElementById('setPWPart');
  const wtEl = document.getElementById('setPWWeight');
  if (!partEl || !wtEl) return;
  const part = partEl.value.trim().toUpperCase();
  const wt = parseFloat(wtEl.value);
  if (!part || isNaN(wt) || wt <= 0) { showToast('Enter part name and weight', 'error'); return; }
  S.partWeights[part] = wt;
  saveState();
  const list = document.getElementById('setPWList');
  if (list) list.innerHTML = renderPartWeightsList();
  partEl.value = '';
  wtEl.value = '';
  showToast('Weight added: ' + part + ' = ' + wt + ' kg');
}

function deletePartWeight(part) {
  if (!confirm('Delete weight for ' + part + '?')) return;
  delete S.partWeights[part];
  saveState();
  const list = document.getElementById('setPWList');
  if (list) list.innerHTML = renderPartWeightsList();
  showToast('Weight removed');
}

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sep-invoicing-backup-' + localDateStr() + '.json';
  a.click();
  showToast('Data exported');
}

function importData() {
  const inp = document.getElementById('importFileInput');
  inp.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.company || !data.clients) throw new Error('Invalid format');
        if (!confirm('Import will replace ALL current data. Continue?')) return;
        S = data;
        saveState();
        closeOverlay();
        renderHome();
        showToast('Data imported');
      } catch(err) {
        showToast('Invalid file: ' + err.message, 'error');
      }
    };
    reader.readAsText(f);
  };
  inp.click();
}

function viewInvoice(invId) {

  if (inv.status === 'cancelled') {
    openInvoiceDetail(invId);

  }

    const mName = monthNames[parseInt(parts[1])] + ' ' + parts[0];

/* Unified sort accessor (Phase 8C) */
function getRegSortConfig() {
  if (_isDesktop && regFilter.desktopSort) return regFilter.desktopSort;
  return { col: 'date', dir: regFilter.regSortDir || 'desc' };
}

function getFilteredInvoices() {
  let list = [...S.invoices];
  if (regFilter.clientId) {
    const cid = parseInt(regFilter.clientId);
    list = list.filter(i => i.clientId === cid);
  }
  if (regFilter.month) {
    list = list.filter(i => i.date && i.date.startsWith(regFilter.month));
  }
  if (regFilter.search) {
    const q = regFilter.search.toLowerCase();
    list = list.filter(i =>
      (i.displayNumber || '').toLowerCase().includes(q) ||
      (i.clientName || '').toLowerCase().includes(q)
    );
  }
  if (regFilter.state) {
    if (regFilter.state === 'cancelled') {
      list = list.filter(i => i.status === 'cancelled');
    } else {
      list = list.filter(i => i.status === 'active' && getInvState(i) === regFilter.state);
    }
  }

  /* Desktop: multi-column sort via getRegSortConfig().
     Mobile: preserve existing createdAt sort (no behavioral change). */
  if (_isDesktop) {
    var sc = getRegSortConfig();
    var dir = sc.dir === 'asc' ? 1 : -1;
    list.sort(function(a, b) {
      var va, vb;
      switch (sc.col) {
        case 'client': va = (a.clientName || '').toLowerCase(); vb = (b.clientName || '').toLowerCase(); return va < vb ? -dir : va > vb ? dir : 0;
        case 'date': va = a.date || ''; vb = b.date || ''; return va < vb ? -dir : va > vb ? dir : 0;
        case 'taxable': return dir * ((a.taxableValue || 0) - (b.taxableValue || 0));
        case 'total': return dir * ((a.grandTotal || 0) - (b.grandTotal || 0));
        case 'state': {
          var so = { created: 0, dispatched: 1, delivered: 2, filed: 3 };
          va = a.status === 'cancelled' ? -1 : (so[getInvState(a)] || 0);
          vb = b.status === 'cancelled' ? -1 : (so[getInvState(b)] || 0);
          return dir * (va - vb);
        }
        default: va = a.date || ''; vb = b.date || ''; return va < vb ? -dir : va > vb ? dir : 0;
      }
    });
  } else {
    var sortDir = regFilter.regSortDir || 'desc';
    if (sortDir === 'asc') {
      list.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    } else {
      list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }
  }
  return list;
}

function _initDragHandle(handleId, masterId, detailId, tabKey) {
  var handle = document.getElementById(handleId);
  if (!handle || handle.dataset.dragInit) return;
  handle.dataset.dragInit = 'true';

  function onStart(e) {
    e.preventDefault();
    var container = handle.parentElement;
    var startX = e.clientX || e.touches[0].clientX;
    _dragState = {
      startX: startX,
      containerW: container.offsetWidth,
      masterStart: document.getElementById(masterId).offsetWidth,
      masterId: masterId, tabKey: tabKey
    };
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }

  handle.addEventListener('mousedown', onStart);
  handle.addEventListener('touchstart', onStart, { passive: false });
}

    var curIdx = INV_STATES.indexOf(curState);
    html += '<div class="inv-detail-section inv-state-timeline">' +
      '<div class="inv-detail-label">Status</div>';

function renderRegisterTable() {
  var area = document.getElementById('regList');
  if (!area) return;

  if (!_regToolbarRendered) {
    renderRegisterToolbar();
    _regToolbarRendered = true;
  }

  var wrapper = document.getElementById('regMasterDetail');
  if (!wrapper) {
    // First render — build wrapper, init drag, restore width
    area.innerHTML =
      '<div class="inv-master-detail" id="regMasterDetail">' +
        '<div class="inv-master" id="regMaster"></div>' +
        '<div class="inv-drag-handle" id="regDragHandle"></div>' +
        '<div class="inv-detail" id="regDetail">' + _renderDetailEmpty() + '</div>' +
      '</div>';
    _initDragHandle('regDragHandle', 'regMaster', 'regDetail', 'pageRegister');
    _restorePanelWidth('regMaster', 'pageRegister');
  }

  // Re-render master content
  var master = document.getElementById('regMaster');
  if (!master) return;
  master.innerHTML = _buildRegisterTableHtml();

  // Detail panel validation: keep detail in sync with data changes
  if (_regActiveInvId) {
    var stillExists = S.invoices.find(function(i) { return i.id === _regActiveInvId; });
    if (!stillExists) {
      // Deleted — clear detail
      _regActiveInvId = null;
      var detail = document.getElementById('regDetail');
      if (detail) detail.innerHTML = _renderDetailEmpty();
    } else {
      // Check if active invoice is still in filtered set
      var filtered = getFilteredInvoices();
      var inFiltered = filtered.find(function(i) { return i.id === _regActiveInvId; });
      if (!inFiltered) {
        // Filtered out — clear detail
        _regActiveInvId = null;
        var detail2 = document.getElementById('regDetail');
        if (detail2) detail2.innerHTML = _renderDetailEmpty();
      } else {
        // Still visible — refresh detail content (skip master since we just rendered it)
        _renderRegDetail(_regActiveInvId, true);
      }
    }
  }

  _renderRegSelBar();
}

/* View dispatcher (Phase 8B) */
function _renderRegView() {
  _isDesktop ? renderRegisterTable() : renderRegisterList();
}

/* Backward-compat: renderRegister calls both */
function renderRegister() {
  if (_isDesktop) {
    renderRegisterTable();
    return;
  }
  _regToolbarRendered = false;
  renderRegisterToolbar();
  _regToolbarRendered = true;
  _renderRegView();
}

/* --- Register bulk selection (Phase 6b) --- */
function toggleRegSelectMode() {
  _regSelectMode = !_regSelectMode;
  _regSelected = {};
  _regToolbarRendered = false;
  renderRegisterToolbar();
  _regToolbarRendered = true;
  _renderRegView();
  _renderRegSelBar();
}

function toggleRegInv(invId) {
  _regSelected[invId] = !_regSelected[invId];
  if (!_regSelected[invId]) delete _regSelected[invId];
  _renderRegView();
  _renderRegSelBar();
}

function _renderRegSelBar() {
  var bar = document.getElementById('regSelBar');
  if (!bar) return;
  var ids = Object.keys(_regSelected).filter(function(k) { return _regSelected[k]; });
  if (ids.length === 0 || (!_isDesktop && !_regSelectMode)) { bar.innerHTML = ''; return; }

  // Determine what state transitions are available
  var canDispatch = 0;
  var canDeliver = 0;
  var canFile = 0;
  ids.forEach(function(id) {
    var inv = S.invoices.find(function(i) { return i.id === id; });
    if (!inv || inv.status !== 'active') return;
    var st = getInvState(inv);
    if (st === 'created') canDispatch++;
    if (st === 'dispatched') canDeliver++;
    if (st === 'delivered') canFile++;
  });

  var btns = '';
  if (canDispatch > 0) btns += '<button class="inv-im-sel-btn" data-action="invRegBulkState" data-state="dispatched">Dispatch (' + canDispatch + ')</button>';
  if (canDeliver > 0) btns += '<button class="inv-im-sel-btn" data-action="invRegBulkState" data-state="delivered">Deliver (' + canDeliver + ')</button>';
  if (canFile > 0) btns += '<button class="inv-im-sel-btn" data-action="invRegBulkState" data-state="filed">File (' + canFile + ')</button>';

  bar.innerHTML = '<div class="inv-im-sel-bar">' +
    '<span class="inv-im-sel-count">' + ids.length + ' selected</span>' +
    '<div class="inv-items-sel-actions">' + btns + '</div></div>';
}

function regBulkSetState(targetState) {
  var ids = Object.keys(_regSelected).filter(function(k) { return _regSelected[k]; });
  var now = Date.now();
  var updated = 0;

  var stateOrder = { created: 0, dispatched: 1, delivered: 2, filed: 3 };
  var targetIdx = stateOrder[targetState];
  if (targetIdx == null) return;

  ids.forEach(function(id) {
    var inv = S.invoices.find(function(i) { return i.id === id; });
    if (!inv || inv.status !== 'active') return;
    var curState = getInvState(inv);
    var curIdx = stateOrder[curState];
    // Only advance by one step
    if (curIdx != null && curIdx + 1 === targetIdx) {
      inv.invoiceState = targetState;
      if (targetState === 'dispatched') inv.dispatchedAt = now;
      else if (targetState === 'delivered') inv.deliveredAt = now;
      else if (targetState === 'filed') inv.filedAt = now;
      updated++;
    }
  });

  if (updated > 0) {
    saveState();
    _regSelected = {};
    _renderRegView();
    _renderRegSelBar();
    showToast(updated + ' invoice' + (updated !== 1 ? 's' : '') + ' marked as ' + INV_STATE_LABELS[targetState]);
  }
}

function toggleRegSortDir() {
  regFilter.regSortDir = (regFilter.regSortDir || 'desc') === 'desc' ? 'asc' : 'desc';
  saveRegFilter();
  _regToolbarRendered = false;
  renderRegisterToolbar();
  _regToolbarRendered = true;
  _renderRegView();
}

/* Edit invoice — loads into Create Invoice in edit mode */
function editInvoice(invId) {
  const inv = S.invoices.find(i => i.id === invId);
  if (!inv) return;
  if (inv.status === 'cancelled') {
    showToast('Cancelled invoices cannot be edited', 'warning');
    return;
  }

  // Check cross-month warning
  const now = new Date();
  const curMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  const invMonth = inv.date ? inv.date.substring(0, 7) : '';
  let editToast = 'Editing ' + inv.displayNumber;
  if (invMonth && invMonth !== curMonth) {
    const monthNames = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
    const parts = invMonth.split('-');
    const mName = monthNames[parseInt(parts[1])] + ' ' + parts[0];
    editToast += ' (' + mName + ' — may affect filed returns)';
  }

  // Load into form
  invoiceForm = {
    clientId: inv.clientId,
    date: inv.date,
    items: inv.items.map(i => ({...i, _override: false, _label: ''})),
    poNumber: inv.poNumber || '',
    poDate: inv.poDate || localDateStr(),
    challanNo: inv.challanNo || '',
    challanDate: inv.challanDate || localDateStr(),
    despatchDate: inv.despatchDate || localDateStr(),
    transport: inv.transport || '',
    eWayBill: inv.eWayBill || '',
    remarks: inv.remarks || '',
    editingId: inv.id
  };
  closeOverlay();
  _navReturnTab = 'pageRegister';
  renderCreateForm();
  switchTab('pageCreate');
  showToast(editToast, 'warning');
}

/* Cancel invoice — set status to cancelled, unlink IM */
function cancelInvoice(invId) {
  const inv = S.invoices.find(i => i.id === invId);
  if (!inv || inv.status === 'cancelled') return;

  // Show confirmation overlay (Act intent)
  const scrim = document.createElement('div');
  scrim.className = 'inv-overlay-scrim';
  scrim.innerHTML = '<div class="inv-overlay-card">' +
    '<div class="inv-overlay-header"><span class="inv-overlay-title">Cancel Invoice</span>' +
    '<button class="inv-overlay-close" data-action="invCloseConfirm">&times;</button></div>' +
    '<div class="inv-confirm-body">Cancel invoice <strong>' + escHtml(inv.displayNumber) + '</strong>?<br>This invoice will appear as cancelled in your GSTR1 export. The customer should be notified. This cannot be undone.</div>' +
    '<div class="inv-btn-bar"><button class="inv-btn inv-btn-ghost" data-action="invCloseConfirm">Keep Active</button>' +
    '<button class="inv-btn inv-btn-primary" data-action="invConfirmCancel" data-id="' + escHtml(inv.id) + '">Cancel Invoice</button></div></div>';
  // Act overlay: scrim tap does nothing (DP 5.2)
  pushFocus();
  document.body.appendChild(scrim);
  document.body.style.overflow = 'hidden';

function confirmCancelInvoice(invId) {
  const inv = S.invoices.find(i => i.id === invId);
  if (!inv) return;
  inv.status = 'cancelled';
  inv.cancelledAt = Date.now();
  inv.updatedAt = Date.now();
  // Unlink IM items (item-level, not entry-level)
  if (inv.linkedIMIds && inv.linkedIMIds.length > 0) {
    inv.linkedIMIds.forEach(imId => {
      const im = (S.incomingMaterial || []).find(m => m.id === imId);
      if (im) {
        im.items.forEach(it => {
          if (it.invoiceId === inv.id) { it.invoiced = false; it.invoiceId = null; }
        });
      }
    });
  }
  saveState();
  closeOverlay();
  renderRegister();
  showToast('Invoice ' + inv.displayNumber + ' cancelled');
}

/* Delete invoice — hard delete with filing cutoff tiered warning */
function deleteInvoice(invId) {
  const inv = S.invoices.find(i => i.id === invId);
  if (!inv) return;

  // Filing cutoff: invoice month + 1 month + 5 days
  const invDate = new Date(inv.date + 'T00:00:00');
  const filingDeadline = new Date(invDate.getFullYear(), invDate.getMonth() + 2, 5);
  const now = new Date();
  const pastDeadline = now >= filingDeadline;

  const scrim = document.createElement('div');
  scrim.className = 'inv-overlay-scrim';

  let warnHtml = '';
  let bodyText = '';
  let btnClass = '';

  if (pastDeadline) {
    // Tier 3: past filing deadline
    warnHtml = '<div class="inv-confirm-warn">This invoice may have been included in a filed GST return. Cancelling (not deleting) is recommended.</div>';
    bodyText = 'Permanently delete invoice <strong>' + escHtml(inv.displayNumber) + '</strong>? This cannot be undone.';
    btnClass = 'inv-btn-danger';
  } else {
    // Tier 2: before filing deadline
    bodyText = 'Delete invoice <strong>' + escHtml(inv.displayNumber) + '</strong>? This number will be available for reuse.';
    btnClass = 'inv-btn-primary';
  }

  scrim.innerHTML = '<div class="inv-overlay-card">' +
    '<div class="inv-overlay-header"><span class="inv-overlay-title">Delete Invoice</span>' +
    '<button class="inv-overlay-close" data-action="invCloseConfirm">&times;</button></div>' +
    warnHtml +
    '<div class="inv-confirm-body">' + bodyText + '</div>' +
    '<div class="inv-btn-bar"><button class="inv-btn inv-btn-ghost" data-action="invCloseConfirm">Keep</button>' +
    '<button class="inv-btn ' + btnClass + '" data-action="invConfirmDelete" data-id="' + escHtml(inv.id) + '">Delete</button></div></div>';
  // Act overlay: scrim tap does nothing (DP 5.2)
  pushFocus();
  document.body.appendChild(scrim);
  document.body.style.overflow = 'hidden';
  focusFirstInteractive(scrim.querySelector('.inv-overlay-card'));
}

function confirmDeleteInvoice(invId) {
  const inv = S.invoices.find(i => i.id === invId);
  if (!inv) return;
  const dispNum = inv.displayNumber;
  // Unlink IM items (item-level, not entry-level)
  if (inv.linkedIMIds && inv.linkedIMIds.length > 0) {
    inv.linkedIMIds.forEach(imId => {
      const im = (S.incomingMaterial || []).find(m => m.id === imId);
      if (im) {
        im.items.forEach(it => {
          if (it.invoiceId === inv.id) { it.invoiced = false; it.invoiceId = null; }
        });
      }
    });
  }
  // Hard delete from array
  const idx = S.invoices.indexOf(inv);
  if (idx > -1) S.invoices.splice(idx, 1);

  // Recycle invoice number: recalculate invNextNum
  if (S.invoices.length === 0) {
    S.invNextNum = 1;
  } else {
    const maxNum = S.invoices.reduce(function(max, inv) {
      const n = parseInt(inv.invoiceNumber);
      return n > max ? n : max;
    }, 0);
    S.invNextNum = maxNum + 1;
  }

  saveState();
  closeOverlay();
  renderRegister();
  showToast('Invoice ' + dispNum + ' deleted');
}

/* ===== GST EXPORT ===== */
function csvEscape(val) {
  const s = String(val == null ? '' : val);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadCSV(filename, rows) {
  const content = rows.map(r => r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function getPlaceOfSupply(inv) {
  const code = (inv.clientAddress && inv.clientAddress.stateCode) || '20';
  const stateMap = { '20': 'Jharkhand', '27': 'Maharashtra' };
  const name = stateMap[code] || (inv.clientAddress && inv.clientAddress.state) || 'Jharkhand';
  return code + '-' + name;
}

let _imExpanded = {};

/* Unified IM sort accessor (Phase 8D) */
function getIMSortConfig() {
  if (_isDesktop && _imFilter.desktopSort) return _imFilter.desktopSort;
  return null; // mobile uses inline sort logic, not config-driven
}

function getIMStatus(im) {
  const total = im.items.length;
  const invoicedCount = im.items.filter(it => it.invoiced).length;
  if (invoicedCount === 0) return 'pending';
  if (invoicedCount < total) return 'partial';
  return 'invoiced';
}

function getFilteredIM() {
  let list = [...(S.incomingMaterial || [])];
  if (_imFilter.clientId) {
    const cid = parseInt(_imFilter.clientId);
    list = list.filter(im => im.clientId === cid);
  }
  if (_imFilter.status) {
    list = list.filter(im => getIMStatus(im) === _imFilter.status);
  }
  // Sort: desktop uses multi-column, mobile uses pending-first + date desc
  if (_isDesktop) {
    var sc = getIMSortConfig();
    if (sc) {
      var dir = sc.dir === 'asc' ? 1 : -1;
      list.sort(function(a, b) {
        var va, vb;
        switch (sc.col) {
          case 'client': va = (a.clientName || '').toLowerCase(); vb = (b.clientName || '').toLowerCase(); return va < vb ? -dir : va > vb ? dir : 0;
          case 'date': va = a.challanDate || ''; vb = b.challanDate || ''; return va < vb ? -dir : va > vb ? dir : 0;
          case 'items': return dir * (a.items.length - b.items.length);
          case 'amount': {
            var ta = a.items.reduce(function(s, it) { return s + (it.amount || 0); }, 0);
            var tb = b.items.reduce(function(s, it) { return s + (it.amount || 0); }, 0);
            return dir * (ta - tb);
          }
          case 'status': {
            var so = { pending: 0, partial: 1, invoiced: 2 };
            va = so[getIMStatus(a)] || 0;
            vb = so[getIMStatus(b)] || 0;
            return dir * (va - vb);
          }
          default: va = a.challanDate || ''; vb = b.challanDate || ''; return va < vb ? -dir : va > vb ? dir : 0;
        }
      });
    } else {
      // Desktop with no explicit sort: same as mobile default
      list.sort(function(a, b) {
        var sa = getIMStatus(a) === 'invoiced' ? 1 : 0;
        var sb = getIMStatus(b) === 'invoiced' ? 1 : 0;
        if (sa !== sb) return sa - sb;
        return (b.challanDate || '').localeCompare(a.challanDate || '') || (b.createdAt || 0) - (a.createdAt || 0);
      });
    }
  } else {
    list.sort(function(a, b) {
      var sa = getIMStatus(a) === 'invoiced' ? 1 : 0;
      var sb = getIMStatus(b) === 'invoiced' ? 1 : 0;
      if (sa !== sb) return sa - sb;
      return (b.challanDate || '').localeCompare(a.challanDate || '') || (b.createdAt || 0) - (a.createdAt || 0);
    });
  }
  return list;
}

      });

      } else if (status !== 'invoiced') {

        var invoicedItemCount = im.items.filter(function(it2) { return it2.invoiced; }).length;
        html += '<div class="inv-btn-bar inv-im-delete-bar">' +

function renderIMSelBar() {
  const bar = document.getElementById('imSelBar');
  const fab = document.getElementById('imFabBar');
  if (!bar) return;
  const selectedIds = Object.keys(_imSelected).filter(k => _imSelected[k]);
  if (selectedIds.length === 0) {
    bar.innerHTML = '';
    if (fab) fab.classList.remove('inv-hidden');
    return;
  }
  if (fab) fab.classList.add('inv-hidden');
  // Calculate total of selected items
  let total = 0;
  (S.incomingMaterial || []).forEach(im => {
    im.items.forEach(it => {
      if (_imSelected[it.id]) total += (it.amount || 0);
    });
  });
  // Check if all selected items belong to one client
  const clientIds = new Set();
  (S.incomingMaterial || []).forEach(im => {
    im.items.forEach(it => {
      if (_imSelected[it.id]) clientIds.add(im.clientId);
    });
  });
  const multiClient = clientIds.size > 1;

  bar.innerHTML = '<div class="inv-im-sel-bar">' +
    '<span class="inv-im-sel-count">' + selectedIds.length + ' item' + (selectedIds.length > 1 ? 's' : '') +
    ' &middot; ' + formatCurrency(total) + '</span>' +
    '<button class="inv-im-sel-btn" data-action="invCreateFromIM"' + (multiClient ? ' disabled title="Select items from one client only"' : '') + '>' +

      '<button class="inv-btn inv-btn-ghost inv-btn-disabled" data-action="invEditChallanGuard" data-count="' + invoicedItemCount + '">Edit</button></div>';

      '<div class="inv-detail-value">' + escHtml(im.notes) + '</div></div>';

  if (!skipMasterRefresh) {

function renderIMTable() {
  var area = document.getElementById('imList');
  if (!area) return;

  if (!_imToolbarRendered) {
    renderIMToolbar();
    _imToolbarRendered = true;
  }

  var wrapper = document.getElementById('imMasterDetail');
  if (!wrapper) {
    // First render — build wrapper, init drag, restore width
    area.innerHTML =
      '<div class="inv-master-detail" id="imMasterDetail">' +
        '<div class="inv-master" id="imMaster"></div>' +
        '<div class="inv-drag-handle" id="imDragHandle"></div>' +
        '<div class="inv-detail" id="imDetail">' + _renderDetailEmpty() + '</div>' +
      '</div>';
    _initDragHandle('imDragHandle', 'imMaster', 'imDetail', 'pageIM');
    _restorePanelWidth('imMaster', 'pageIM');
  }

  // Re-render master content
  var master = document.getElementById('imMaster');
  if (!master) return;
  master.innerHTML = _buildIMTableHtml();

  // Detail panel validation: keep detail in sync with data changes
  if (_imActiveChallanId) {
    var stillExists = (S.incomingMaterial || []).find(function(m) { return m.id === _imActiveChallanId; });
    if (!stillExists) {
      // Deleted — clear detail
      _imActiveChallanId = null;
      var detail = document.getElementById('imDetail');
      if (detail) detail.innerHTML = _renderDetailEmpty();
    } else {
      // Check if active challan is still in filtered set
      var filtered = getFilteredIM();
      var inFiltered = filtered.find(function(m) { return m.id === _imActiveChallanId; });
      if (!inFiltered) {
        // Filtered out — clear detail
        _imActiveChallanId = null;
        var detail2 = document.getElementById('imDetail');
        if (detail2) detail2.innerHTML = _renderDetailEmpty();
      } else {
        // Still visible — refresh detail content (skip master since we just rendered it)
        _renderIMDetail(_imActiveChallanId, true);
      }
    }
  }

  renderIMSelBar();
}

  _isDesktop ? renderIMTable() : renderIMList();

function toggleIMExpand(imId) {
  _imExpanded[imId] = !_imExpanded[imId];
  _renderIMView();
}

function toggleIMItem(itemId) {
  _imSelected[itemId] = !_imSelected[itemId];
  if (!_imSelected[itemId]) delete _imSelected[itemId];
  _renderIMView();
}

function toggleIMChallan(imId) {
  const im = (S.incomingMaterial || []).find(m => m.id === imId);
  if (!im) return;
  const pendingItems = im.items.filter(it => !it.invoiced);
  const allChecked = pendingItems.every(it => _imSelected[it.id]);
  pendingItems.forEach(it => {
    if (allChecked) {
      delete _imSelected[it.id];
    } else {
      _imSelected[it.id] = true;
    }
  });
  _renderIMView();
}

function createInvoiceFromIM() {
  const selectedIds = Object.keys(_imSelected).filter(k => _imSelected[k]);
  if (selectedIds.length === 0) return;

  // Collect selected items and determine client
  const selectedItems = [];
  const linkedIMIds = new Set();
  let clientId = null;
  (S.incomingMaterial || []).forEach(im => {
    im.items.forEach(it => {
      if (_imSelected[it.id]) {
        selectedItems.push({ ...it, _imId: im.id, _challanNo: im.challanNo, _challanDate: im.challanDate, _vehicleNo: im.vehicleNo });
        linkedIMIds.add(im.id);
        clientId = im.clientId;
      }
    });
  });

  if (!clientId) return;
  const client = S.clients.find(c => c.id === clientId);
  if (!client) return;

  // Build invoice form
  invoiceForm = {
    clientId: clientId,
    date: localDateStr(),
    items: selectedItems.map(it => ({
      partNumber: it.partNumber,
      desc: it.desc,
      hsn: it.hsn || '998873',
      unit: it.unit,
      qty: it.qty,
      rate: it.rate || 0,
      amount: it.amount || 0,
      nosQty: it.nosQty || null,
      _override: false,
      _label: '',
      _imItemId: it.id
    })),
    poNumber: '', poDate: localDateStr(),
    challanNo: selectedItems.map(it => it._challanNo).filter(Boolean).filter((v,i,a) => a.indexOf(v) === i).join(', '),
    challanDate: selectedItems[0]._challanDate || localDateStr(),
    despatchDate: localDateStr(), transport: selectedItems.map(it => it._vehicleNo).filter(Boolean).filter((v,i,a) => a.indexOf(v) === i).join(', '), eWayBill: '',
    remarks: '',
    editingId: null,
    _linkedIMItemIds: selectedIds,
    _linkedIMIds: [...linkedIMIds]
  };

  // Clear selection
  _imSelected = {};

  renderCreateForm();

/* ===== PART AUTOCOMPLETE (Phase 3) ===== */
function searchParts(query) {
  if (!query || query.length < 1) return [];
  const q = query.toLowerCase();
  const matches = [];
  for (let i = 0; i < S.items.length && matches.length < 8; i++) {
    const item = S.items[i];
    if ((item.partNumber || '').toLowerCase().includes(q) ||
        (item.desc || '').toLowerCase().includes(q)) {
      matches.push(item);
    }
  }
  return matches;
}

function showPartAutocomplete(idx, query) {
  const acEl = document.getElementById('invPartAC' + idx);
  if (!acEl) return;
  const matches = searchParts(query);
  if (matches.length === 0) {
    acEl.classList.add('inv-hidden');
    return;
  }
  acEl.classList.remove('inv-hidden');
  acEl.innerHTML = matches.map(m =>
    '<div class="inv-autocomplete-item" data-action="invSelectPart" data-idx="' + idx + '" data-part-id="' + m.id + '">' +
    '<span class="inv-autocomplete-part">' + escHtml(m.partNumber) + '</span>' +
    '<span class="inv-autocomplete-desc">' + escHtml(m.desc) + '</span></div>'
  ).join('');
}

function dismissAllAutocomplete() {
  document.querySelectorAll('.inv-autocomplete-list').forEach(el => el.classList.add('inv-hidden'));
}

function selectPartForLine(idx, partId) {
  const part = S.items.find(p => p.id === partId);
  if (!part) return;
  const item = invoiceForm.items[idx];
  if (!item) return;
  item.partNumber = part.partNumber;
  item.desc = part.desc;
  item.hsn = part.hsn || '998873';
  item.unit = part.unit || 'KG';

  const client = invoiceForm.clientId ? S.clients.find(c => c.id === invoiceForm.clientId) : null;
  if (client) {
    const rateInfo = getLineItemRate(client, invoiceForm.date, item.partNumber);
    if (rateInfo._override) {
      item.rate = rateInfo.rate;
      item._override = true;
      item._label = rateInfo._label;
    } else {
      item.rate = rateInfo.ratePerKg || 0;
      item._override = false;
      item._label = '';
    }
    recalcLineItem(item, client);
  }

  dismissAllAutocomplete();
  captureOptionalFields();
  renderCreateForm();
}

/* ===== STATS (Phase 7 — Analytics Rework) ===== */
var _statsPeriod = 'mtd';

function filterByPeriod(invoices, period) {
  if (period === 'all') return invoices;
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  var startDate;
  if (period === 'mtd') {
    startDate = new Date(y, m, 1);
  } else if (period === 'qtd') {
    var qStart = m - (m % 3);
    startDate = new Date(y, qStart, 1);
  } else if (period === 'ytd') {
    startDate = m >= 3 ? new Date(y, 3, 1) : new Date(y - 1, 3, 1);
  }
  var startTs = startDate.getTime();
  return invoices.filter(function(inv) {
    return (inv.createdAt || 0) >= startTs;
  });
}

function buildMonthlyRevenue(invoices) {
  var byMonth = {};
  invoices.forEach(function(inv) {
    if (!inv.date) return;
    var ym = inv.date.substring(0, 7);
    if (!byMonth[ym]) byMonth[ym] = 0;
    byMonth[ym] += (inv.taxableValue || 0);
  });
  var months = Object.keys(byMonth).sort();
  var last12 = months.slice(-12);
  var labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return last12.map(function(ym) {
    var parts = ym.split('-');
    return { label: labels[parseInt(parts[1]) - 1] + ' ' + parts[0].slice(2), value: byMonth[ym] };
  });
}

function buildTopItems(invoices) {
  var byPart = {};
  invoices.forEach(function(inv) {
    (inv.items || []).forEach(function(it) {
      var key = it.partNumber || it.desc || 'Unknown';
      if (!byPart[key]) byPart[key] = { part: key, desc: it.desc || '', qty: 0, amount: 0 };
      byPart[key].qty += (it.qty || 0);
      byPart[key].amount += (it.amount || 0);
    });
  });
  return Object.values(byPart).sort(function(a, b) { return b.qty - a.qty; }).slice(0, 10);
}

function renderRevenueBarSvg(ranked, maxVal) {
  if (ranked.length === 0) return '<div class="inv-text-muted">No client data</div>';
  var barH = 28, gap = 8, padTop = 4, padBot = 4;
  var totalH = padTop + ranked.length * (barH + gap) - gap + padBot;
  var svg = '<svg class="inv-svg-chart" viewBox="0 0 400 ' + totalH + '" preserveAspectRatio="xMinYMin meet">';
  ranked.forEach(function(r, i) {
    var y = padTop + i * (barH + gap);
    var w = maxVal > 0 ? (r.total / maxVal) * 200 : 0;
    svg += '<g class="inv-svg-bar-group" data-action="invStatsClientDrill" data-client-id="' + r.clientId + '">';
    svg += '<rect x="0" y="' + y + '" width="' + Math.max(w, 2) + '" height="' + barH + '" rx="3" class="inv-svg-bar"/>';
    svg += '<text x="' + (Math.max(w, 2) + 6) + '" y="' + (y + 12) + '" class="inv-svg-bar-label">' + escHtml(r.name) + '</text>';
    svg += '<text x="' + (Math.max(w, 2) + 6) + '" y="' + (y + 24) + '" class="inv-svg-bar-amount">' + formatCurrency(r.total) + '</text>';
    svg += '</g>';
  });
  svg += '</svg>';
  return svg;
}

function renderTrendSvg(monthlyData) {
  if (monthlyData.length < 2) return '<div class="inv-text-muted">Need 2+ months of data for trend</div>';
  var W = 400, H = 160, padL = 10, padR = 40, padT = 20, padB = 30;
  var chartW = W - padL - padR, chartH = H - padT - padB;
  var maxVal = Math.max.apply(null, monthlyData.map(function(d) { return d.value; }));
  if (maxVal === 0) maxVal = 1;
  var points = monthlyData.map(function(d, i) {
    var x = padL + (i / (monthlyData.length - 1)) * chartW;
    var y = padT + chartH - (d.value / maxVal) * chartH;
    return { x: x, y: y, label: d.label, value: d.value };
  });
  var polyline = points.map(function(p) { return p.x + ',' + p.y; }).join(' ');
  var areaPath = 'M' + points[0].x + ',' + (padT + chartH) +
    ' L' + points.map(function(p) { return p.x + ',' + p.y; }).join(' L') +
    ' L' + points[points.length - 1].x + ',' + (padT + chartH) + ' Z';

  var svg = '<svg class="inv-svg-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  for (var g = 0; g <= 3; g++) {
    var gy = padT + (g / 3) * chartH;
    var gVal = maxVal - (g / 3) * maxVal;
    svg += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '" class="inv-svg-grid"/>';
    svg += '<text x="' + (W - padR + 4) + '" y="' + (gy + 4) + '" class="inv-svg-grid-label">' + (gVal >= 100000 ? formatNum(gVal / 100000, 1) + 'L' : formatNum(gVal / 1000, 0) + 'K') + '</text>';
  }
  svg += '<path d="' + areaPath + '" class="inv-svg-area"/>';
  svg += '<polyline points="' + polyline + '" class="inv-svg-line"/>';
  points.forEach(function(p) {
    svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="3.5" class="inv-svg-dot"/>';
    svg += '<text x="' + p.x + '" y="' + (padT + chartH + 16) + '" text-anchor="middle" class="inv-svg-axis-label">' + p.label + '</text>';
  });
  svg += '</svg>';
  return svg;
}

function renderStats() {
  var toolbar = document.getElementById('statsToolbar');
  var area = document.getElementById('statsContent');
  if (!area) return;

  // Period chips
  if (toolbar) {
    var chips = ['mtd', 'qtd', 'ytd', 'all'];
    var chipLabels = { mtd: 'MTD', qtd: 'QTD', ytd: 'YTD', all: 'All' };
    var chipHtml = '<div class="inv-stats-chips">';
    chips.forEach(function(p) {
      chipHtml += '<button class="inv-chip' + (_statsPeriod === p ? ' inv-chip-active' : '') +
        '" data-action="invStatsPeriod" data-period="' + p + '">' + chipLabels[p] + '</button>';
    });
    chipHtml += '</div>';
    toolbar.innerHTML = chipHtml;
  }

  var activeInvs = S.invoices.filter(function(i) { return i.status === 'active'; });
  var filtered = filterByPeriod(activeInvs, _statsPeriod);
  var html = '';

  // Card 1: Revenue Overview
  var totalRev = filtered.reduce(function(s, i) { return s + (i.taxableValue || 0); }, 0);
  var totalGrand = filtered.reduce(function(s, i) { return s + (i.grandTotal || 0); }, 0);
  var allTimeRev = activeInvs.reduce(function(s, i) { return s + (i.taxableValue || 0); }, 0);
  var pctOfAll = allTimeRev > 0 ? Math.round(totalRev / allTimeRev * 100) : 0;
  html += '<div class="inv-stats-card">' +
    '<div class="inv-stats-title">Revenue Overview</div>' +
    '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Taxable Revenue</span>' +
    '<span class="inv-stats-metric-value">' + formatCurrency(totalRev) + '</span></div>' +
    '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Grand Total (incl. GST)</span>' +
    '<span class="inv-stats-metric-sub">' + formatCurrency(totalGrand) + '</span></div>' +
    '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Invoices</span>' +
    '<span class="inv-stats-metric-sub">' + filtered.length + (_statsPeriod !== 'all' ? ' (' + pctOfAll + '% of all-time)' : '') + '</span></div></div>';

  // Card 2: Invoice States
  var stateCount = { created: 0, dispatched: 0, delivered: 0, filed: 0 };
  filtered.forEach(function(inv) {
    var s = getInvState(inv);
    if (stateCount[s] != null) stateCount[s]++;
  });
  html += '<div class="inv-stats-card">' +
    '<div class="inv-stats-title">Invoice States</div>' +
    '<div class="inv-stats-states-row">' +
    '<span class="inv-state-badge inv-state-created">' + stateCount.created + ' Created</span>' +
    '<span class="inv-state-badge inv-state-dispatched">' + stateCount.dispatched + ' Dispatched</span>' +
    '<span class="inv-state-badge inv-state-delivered">' + stateCount.delivered + ' Delivered</span>' +
    '<span class="inv-state-badge inv-state-filed">' + stateCount.filed + ' Filed</span>' +
    '</div></div>';

  // Card 3: Revenue by Client — SVG bar chart (full-width)
  var clientRev = {};
  filtered.forEach(function(inv) {
    var key = inv.clientId;
    if (!clientRev[key]) clientRev[key] = { clientId: key, name: inv.clientName, total: 0, count: 0 };
    clientRev[key].total += (inv.taxableValue || 0);
    clientRev[key].count++;
  });
  var ranked = Object.values(clientRev).sort(function(a, b) { return b.total - a.total; });
  var maxClientRev = ranked.length > 0 ? ranked[0].total : 0;
  html += '<div class="inv-stats-card inv-stats-card-full">' +
    '<div class="inv-stats-title">Revenue by Client</div>' +
    renderRevenueBarSvg(ranked, maxClientRev) + '</div>';

  // Card 4: Pending Revenue (always current, not period-filtered)
  var pendingByClient = {};
  (S.incomingMaterial || []).forEach(function(im) {
    im.items.forEach(function(it) {
      if (!it.invoiced) {
        var key = im.clientId;
        if (!pendingByClient[key]) pendingByClient[key] = { clientId: key, name: im.clientName, total: 0, items: 0 };
        pendingByClient[key].total += (it.amount || 0);
        pendingByClient[key].items++;
      }
    });
  });
  var pendingRanked = Object.values(pendingByClient).sort(function(a, b) { return b.total - a.total; });
  var totalPending = pendingRanked.reduce(function(s, r) { return s + r.total; }, 0);
  html += '<div class="inv-stats-card">' +
    '<div class="inv-stats-title">Pending Revenue</div>' +
    '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Total Unbilled</span>' +
    '<span class="inv-stats-metric-value">' + formatCurrency(totalPending) + '</span></div>';
  pendingRanked.forEach(function(r) {
    html += '<div class="inv-stats-row inv-stats-row-tap" data-action="invStatsClientDrill" data-client-id="' + r.clientId + '">' +
      '<span class="inv-stats-name">' + escHtml(r.name) + ' <span class="inv-text-muted">(' + r.items + ' items)</span></span>' +
      '<span class="inv-stats-val">' + formatCurrency(r.total) + '</span></div>';
  });
  if (pendingRanked.length === 0) {
    html += '<div class="inv-text-muted inv-p-8">All material invoiced</div>';
  }
  html += '</div>';

  // Card 5: Monthly Trend (full-width, always all-time)
  var monthlyData = buildMonthlyRevenue(activeInvs);
  html += '<div class="inv-stats-card inv-stats-card-full">' +
    '<div class="inv-stats-title">Monthly Revenue Trend</div>' +
    renderTrendSvg(monthlyData) + '</div>';

  // Card 6: Dispatch Cycle
  var dispatchDays = [], deliveryDays = [], fullCycleDays = [];
  filtered.forEach(function(inv) {
    if (inv.createdAt && inv.dispatchedAt) dispatchDays.push((inv.dispatchedAt - inv.createdAt) / 86400000);
    if (inv.dispatchedAt && inv.deliveredAt) deliveryDays.push((inv.deliveredAt - inv.dispatchedAt) / 86400000);
    if (inv.createdAt && inv.deliveredAt) fullCycleDays.push((inv.deliveredAt - inv.createdAt) / 86400000);
  });
  function avg(arr) { return arr.length > 0 ? (arr.reduce(function(a, b) { return a + b; }, 0) / arr.length) : null; }
  var avgDispatch = avg(dispatchDays);
  var avgDelivery = avg(deliveryDays);
  var avgFull = avg(fullCycleDays);
  if (avgDispatch !== null || avgDelivery !== null) {
    html += '<div class="inv-stats-card">' +
      '<div class="inv-stats-title">Dispatch Cycle</div>';
    if (avgDispatch !== null) {
      html += '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Created to Dispatched</span>' +
        '<span class="inv-stats-metric-sub">' + formatNum(avgDispatch, 1) + ' days avg (' + dispatchDays.length + ')</span></div>';
    }
    if (avgDelivery !== null) {
      html += '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Dispatched to Delivered</span>' +
        '<span class="inv-stats-metric-sub">' + formatNum(avgDelivery, 1) + ' days avg (' + deliveryDays.length + ')</span></div>';
    }
    if (avgFull !== null) {
      html += '<div class="inv-stats-metric"><span class="inv-stats-metric-label">Full Cycle</span>' +
        '<span class="inv-stats-metric-sub">' + formatNum(avgFull, 1) + ' days avg (' + fullCycleDays.length + ')</span></div>';
    }
    html += '</div>';
  }

  // Card 7: Top Items by Volume (full-width)
  var topItems = buildTopItems(filtered);
  if (topItems.length > 0) {
    html += '<div class="inv-stats-card inv-stats-card-full">' +
      '<div class="inv-stats-title">Top Items by Volume</div>' +
      '<div class="inv-stats-table"><div class="inv-stats-table-header">' +
      '<span class="inv-stats-table-cell inv-stats-table-rank">#</span>' +
      '<span class="inv-stats-table-cell inv-stats-table-part">Part</span>' +
      '<span class="inv-stats-table-cell inv-stats-table-qty">Qty</span>' +
      '<span class="inv-stats-table-cell inv-stats-table-amt">Amount</span></div>';
    topItems.forEach(function(it, idx) {
      html += '<div class="inv-stats-table-row">' +
        '<span class="inv-stats-table-cell inv-stats-table-rank">' + (idx + 1) + '</span>' +
        '<span class="inv-stats-table-cell inv-stats-table-part">' + escHtml(it.part) +
        (it.desc && it.desc !== it.part ? '<br><span class="inv-text-muted inv-text-xs">' + escHtml(it.desc) + '</span>' : '') + '</span>' +
        '<span class="inv-stats-table-cell inv-stats-table-qty inv-mono">' + formatNum(it.qty, 2) + '</span>' +
        '<span class="inv-stats-table-cell inv-stats-table-amt inv-mono">' + formatCurrency(it.amount) + '</span></div>';
    });
    html += '</div></div>';
  }

  if (html === '') html = '<div class="inv-empty-state">No data yet. Create invoices and log incoming material to see analytics.</div>';
  area.innerHTML = html;
}

function openClientDrillOverlay(clientId) {
  clientId = parseInt(clientId);
  var client = S.clients.find(function(c) { return c.id === clientId; });
  if (!client) { showToast('Client not found', 'warning'); return; }

  var activeInvs = S.invoices.filter(function(i) { return i.status === 'active'; });
  var filtered = filterByPeriod(activeInvs, _statsPeriod);
  var clientInvs = filtered.filter(function(i) { return i.clientId === clientId; });
  var totalRev = clientInvs.reduce(function(s, i) { return s + (i.taxableValue || 0); }, 0);
  var allRev = filtered.reduce(function(s, i) { return s + (i.taxableValue || 0); }, 0);
  var pct = allRev > 0 ? Math.round(totalRev / allRev * 100) : 0;

  var pendingAmt = 0, pendingItems = 0;
  (S.incomingMaterial || []).forEach(function(im) {
    if (im.clientId !== clientId) return;
    im.items.forEach(function(it) {
      if (!it.invoiced) { pendingAmt += (it.amount || 0); pendingItems++; }
    });
  });

  var stateCounts = { created: 0, dispatched: 0, delivered: 0, filed: 0 };
  clientInvs.forEach(function(inv) {
    var s = getInvState(inv);
    if (stateCounts[s] != null) stateCounts[s]++;
  });

  var rateInfo = '';
  if (client.billingMode === 'perKg') {
    var r = getLineItemRate(client, localDateStr());
    rateInfo = 'Per Kg \u00b7 ' + formatCurrency(r.ratePerKg || r.rate || 0) + '/kg';
  } else if (client.billingMode === 'perPiece') {
    rateInfo = 'Per Piece';
  } else {
    rateInfo = client.billingMode || 'Standard';
  }

  var recentInvs = S.invoices
    .filter(function(i) { return i.clientId === clientId && i.status === 'active'; })
    .sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); })
    .slice(0, 5);
  var recentHtml = '';
  if (recentInvs.length === 0) {
    recentHtml = '<div class="inv-text-muted">No invoices</div>';
  } else {
    recentInvs.forEach(function(inv) {
      recentHtml += '<div class="inv-flip-row">' +
        '<span class="inv-mono">' + escHtml(inv.displayNumber) + '</span>' +
        '<span class="inv-text-muted">' + formatDate(inv.date) + '</span>' +
        '<span class="inv-mono inv-text-cost">' + formatCurrency(inv.grandTotal) + '</span>' +
        getStateBadgeHtml(inv) + '</div>';
    });
  }

  var pendingChallans = (S.incomingMaterial || []).filter(function(im) {
    if (im.clientId !== clientId) return false;
    return im.items.some(function(it) { return !it.invoiced; });
  });
  var challanHtml = '';
  if (pendingChallans.length === 0) {
    challanHtml = '<div class="inv-text-muted">No pending challans</div>';
  } else {
    pendingChallans.forEach(function(im) {
      var pItems = im.items.filter(function(it) { return !it.invoiced; });
      var pAmt = pItems.reduce(function(s, it) { return s + (it.amount || 0); }, 0);
      challanHtml += '<div class="inv-flip-row">' +
        '<span>' + (im.challanNo ? 'Ch. ' + escHtml(im.challanNo) : 'No number') + '</span>' +
        '<span class="inv-text-muted">' + formatDate(im.challanDate) + '</span>' +
        '<span class="inv-text-muted">' + pItems.length + ' items</span>' +
        '<span class="inv-mono">' + formatCurrency(pAmt) + '</span></div>';
    });
  }

  var periodLabels = { mtd: 'MTD', qtd: 'QTD', ytd: 'YTD', all: 'All Time' };
  var periodLabel = periodLabels[_statsPeriod] || 'All';

  pushFocus();
  document.body.style.overflow = 'hidden';
  var scrim = document.createElement('div');
  scrim.className = 'inv-overlay-scrim';
  scrim.innerHTML = '<div class="inv-overlay-card inv-flip-container">' +
    '<div class="inv-flip-inner">' +
    '<div class="inv-flip-front">' +
    '<div class="inv-overlay-header"><span class="inv-overlay-title">' + escHtml(client.name) + '</span>' +
    '<button class="inv-overlay-close" data-action="invCloseOverlay">&times;</button></div>' +
    '<div class="inv-flip-period-label">' + escHtml(periodLabel) + '</div>' +
    '<div class="inv-flip-kpis">' +
    '<div class="inv-flip-kpi"><span class="inv-flip-kpi-label">Revenue</span><span class="inv-flip-kpi-value">' + formatCurrency(totalRev) + '</span></div>' +
    '<div class="inv-flip-kpi"><span class="inv-flip-kpi-label">Invoices</span><span class="inv-flip-kpi-value">' + clientInvs.length + '</span></div>' +
    '<div class="inv-flip-kpi"><span class="inv-flip-kpi-label">Share</span><span class="inv-flip-kpi-value">' + pct + '%</span></div>' +
    '<div class="inv-flip-kpi"><span class="inv-flip-kpi-label">Unbilled</span><span class="inv-flip-kpi-value">' + formatCurrency(pendingAmt) + '</span></div>' +
    '</div>' +
    '<div class="inv-flip-states">' +
    '<span class="inv-state-badge inv-state-created">' + stateCounts.created + ' Created</span>' +
    '<span class="inv-state-badge inv-state-dispatched">' + stateCounts.dispatched + ' Dispatched</span>' +
    '<span class="inv-state-badge inv-state-delivered">' + stateCounts.delivered + ' Delivered</span>' +
    '<span class="inv-state-badge inv-state-filed">' + stateCounts.filed + ' Filed</span>' +
    '</div>' +
    '<div class="inv-flip-meta">' + escHtml(rateInfo) + '</div>' +
    '<button class="inv-btn inv-btn-ghost inv-btn-block" data-action="invFlipCard">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>' +
    ' Details &amp; Actions</button>' +
